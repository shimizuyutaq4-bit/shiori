let hlSeq = 0;
function newHid(){ hlSeq++; return "h"+Date.now().toString(36)+hlSeq.toString(36); }
function hlList(){ return (cur.work && shelf[cur.work.id] && shelf[cur.work.id].highlights) || []; }
function ensureHlArray(){ const r=rec(cur.work.id); if(!r.highlights) r.highlights=[]; return r.highlights; }

// 本文テキストノードを（ルビ読み rt/rp を除いて）連結したフラットテキスト
function buildFlat(root){
  const segs=[]; let text="";
  const w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      if(!n.nodeValue) return NodeFilter.FILTER_REJECT;
      let p=n.parentNode;
      while(p&&p!==root){ if(p.nodeName==="RT"||p.nodeName==="RP") return NodeFilter.FILTER_REJECT; p=p.parentNode; }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  let n; while(n=w.nextNode()){ segs.push({node:n, start:text.length, len:n.nodeValue.length}); text+=n.nodeValue; }
  return {segs, text};
}
function unwrapHighlights(root){
  root.querySelectorAll("mark.hl").forEach(m=>{
    const p=m.parentNode; while(m.firstChild) p.insertBefore(m.firstChild, m); p.removeChild(m); p.normalize();
  });
}
function wrapFlatRange(flat, fStart, fEnd, hid, color, hasNote){
  for(const s of flat.segs){
    const segEnd=s.start+s.len;
    if(segEnd<=fStart || s.start>=fEnd) continue;
    const a=Math.max(fStart,s.start)-s.start, b=Math.min(fEnd,segEnd)-s.start;
    if(b<=a) continue;
    try{
      const range=document.createRange(); range.setStart(s.node,a); range.setEnd(s.node,b);
      const mark=document.createElement("mark");
      mark.className="hl"+(hasNote?" hasnote":""); mark.dataset.hid=hid;
      if(color&&color!=="amber") mark.dataset.color=color;
      mark.addEventListener("click",(e)=>{ e.stopPropagation(); showHlTip(hid, e); });
      range.surroundContents(mark);
    }catch(e){}
  }
}
function renderHighlights(){
  const book=document.getElementById("book"); if(!book||!cur.work) return;
  unwrapHighlights(book);
  normalizeHighlights(book);   // 重なりを統合してから描画（常に一色）
  hlList().filter(h=>h.text).forEach(h=>{
    const flat=buildFlat(book);   // マーク挿入でDOMが変わるため毎回作り直す
    let idx=-1, from=0, count=0;
    while((idx=flat.text.indexOf(h.text, from))>=0){ if(count===(h.occurrence||0)) break; from=idx+1; count++; }
    if(idx<0) idx=flat.text.indexOf(h.text);
    if(idx<0) return;
    wrapFlatRange(flat, idx, idx+h.text.length, h.hid, h.color, !!(h.note&&h.note.trim()));
  });
}
function selectionInfo(){
  if(customSel) return {text:customSel.text, occurrence:customSel.occurrence, fStart:customSel.fStart};
  const sel=document.getSelection(); if(!sel||sel.isCollapsed) return null;
  const text=sel.toString().trim(); if(!text) return null;
  const book=document.getElementById("book"); if(!book.contains(sel.anchorNode)) return null;
  const flat=buildFlat(book);
  const range=sel.getRangeAt(0);
  let fStart=-1;
  for(const s of flat.segs){ if(s.node===range.startContainer){ fStart=s.start+range.startOffset; break; } }
  let occurrence=0;
  if(fStart>=0){ let from=0, idx; while((idx=flat.text.indexOf(text, from))>=0 && idx<fStart){ occurrence++; from=idx+1; } }
  return {text, occurrence, fStart};
}
// ハイライトの現在のフラット範囲 [start,end]（見つからなければ null）
function hlFlatRange(h, flat){
  if(!h.text) return null;
  let idx=-1, from=0, c=0;
  while((idx=flat.text.indexOf(h.text, from))>=0){ if(c===(h.occurrence||0)) break; from=idx+1; c++; }
  if(idx<0) idx=flat.text.indexOf(h.text);
  if(idx<0) return null;
  return [idx, idx+h.text.length];
}
// 重なり合うハイライトを1つに統合（＝重ね塗り防止）
function normalizeHighlights(book){
  const r=cur.work && shelf[cur.work.id]; if(!r||!r.highlights||!r.highlights.length) return;
  const flat=buildFlat(book);
  const items=[], rest=[];
  for(const h of r.highlights){ const rng=hlFlatRange(h,flat); if(rng) items.push({h,rng}); else rest.push(h); }
  items.sort((a,b)=> a.rng[0]-b.rng[0] || a.rng[1]-b.rng[1]);
  const merged=[];
  for(const it of items){
    const last=merged[merged.length-1];
    if(last && it.rng[0] < last.rng[1]){                       // 重なり → 統合
      if(it.rng[1]>last.rng[1]) last.rng[1]=it.rng[1];
      if(it.h.note && it.h.note.trim()) last.h.note=(last.h.note&&last.h.note.trim()? last.h.note+" / ":"")+it.h.note;
    } else merged.push({h:it.h, rng:it.rng.slice()});
  }
  const rebuilt=merged.map(m=>{
    const text=flat.text.slice(m.rng[0], m.rng[1]);
    let occ=0, from=0, idx; while((idx=flat.text.indexOf(text,from))>=0 && idx<m.rng[0]){ occ++; from=idx+1; }
    return {hid:m.h.hid, text, occurrence:occ, note:m.h.note||"", color:m.h.color||"amber", date:m.h.date||isoNow()};
  });
  r.highlights = rebuilt.concat(rest);
  saveShelf();
}
function addHighlight(){
  if(!cur.work) return null;
  const info=selectionInfo(); if(!info) return null;
  ensureHlArray().push({hid:newHid(), text:info.text, occurrence:info.occurrence, note:"", color:"amber", date:isoNow()});
  try{ document.getSelection().removeAllRanges(); }catch(e){}
  hideSelTip();
  renderHighlights();   // ここで重なりが統合される
  // 統合後、選択位置を含むハイライトを返す（メモ導線用）
  const flat=buildFlat(document.getElementById("book"));
  let pos=info.fStart;
  if(pos<0){ let idx=-1,from=0,c=0; while((idx=flat.text.indexOf(info.text,from))>=0){ if(c===info.occurrence) break; from=idx+1; c++; } pos=idx; }
  return hlList().find(x=>{ const rg=hlFlatRange(x,flat); return rg && pos>=rg[0] && pos<rg[1]; }) || null;
}
function removeHighlight(hid){
  if(!cur.work) return;
  const r=rec(cur.work.id); if(!r.highlights) return;
  r.highlights=r.highlights.filter(h=>h.hid!==hid); saveShelf(); renderHighlights();
}

/* ---------- データのバックアップ ---------- */
function exportData(){
  readTick();   // 直近の読書時間も書き出しに含める
  const data = { app:"shiori", version:2, date:new Date().toISOString(),
    settings:{ theme:settings.theme, size:settings.size, chatModel:settings.chatModel },
    shelf: shelf, readlog: readLog };
  const blob = new Blob([JSON.stringify(data,null,1)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "shiori-backup-"+isoNow()+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importData(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      const incoming = data.shelf || (data.app? {} : data);   // shelf直か、丸ごとか
      if(!incoming || typeof incoming!=="object") throw new Error("形式が違います");
      let n=0;
      for(const id in incoming){
        const src = incoming[id]; if(!src||typeof src!=="object") continue; n++;
        const dst = shelf[id] || (shelf[id]={fraction:0});
        if(typeof src.fraction==="number") dst.fraction = Math.max(dst.fraction||0, src.fraction);
        if(src.updated) dst.updated = src.updated;
        if(src.rating!=null){ dst.rating=src.rating; dst.review=src.review||""; dst.reviewDate=src.reviewDate||isoNow(); }
        if(src.checked) dst.checked = true;
        if(Array.isArray(src.highlights) && src.highlights.length){
          dst.highlights = dst.highlights || [];
          const seen = new Set(dst.highlights.map(h=>h.hid));
          src.highlights.forEach(h=>{ if(h && h.hid && !seen.has(h.hid)){ dst.highlights.push(h); seen.add(h.hid); } });
        }
      }
      saveShelf();
      // 設定（テーマ・文字サイズ・AIモデル）を復元
      if(data.settings){
        if(data.settings.theme) settings.theme = data.settings.theme;
        if(typeof data.settings.size==="number") settings.size = data.settings.size;
        if(data.settings.chatModel) settings.chatModel = data.settings.chatModel;
        saveSettings();   // applyTheme込み
        document.documentElement.style.setProperty("--reader-size", settings.size+"px");
      }
      // 読書活動ログ（日数・時間・連続日数）をマージ。日ごとに大きい方＝再読込での二重計上を防ぐ
      if(data.readlog && data.readlog.days){
        readLog.days = readLog.days || {};
        for(const d in data.readlog.days){ readLog.days[d] = Math.max(readLog.days[d]||0, data.readlog.days[d]||0); }
        saveReadLog();
      }
      alert(n+" 作品ぶんの記録を読み込みました。");
      renderLibrary();
    }catch(e){ alert("読み込みに失敗しました：" + e.message); }
    input.value = "";
  };
  reader.readAsText(file);
}

/* ---------- 端末間同期（shimi-sync: 同期コード方式） ----------
   保存のたびに shelf/readlog/settings(一部) を Cloudflare KV へ送信（最短60秒間隔）。
   起動時とタブ復帰時に取得し、作品ごと・日付ごとに統合マージ（importDataと同じ方針）。
   サーバーは楽観ロック(409)で「古い端末による黙った上書き」を拒否する。
   APIキー(geminiKey)と文字サイズ(size)は端末ごとの設定として同期しない。 */
const SYNC_URL="https://shimi-sync.shimi-works.workers.dev/v1/shiori/";
const SYNC_LS_CODE="shiori.sync.code", SYNC_LS_BASE="shiori.sync.base", SYNC_LS_DIRTY="shiori.sync.dirty";
const SYNC_KEYS=["shiori.shelf","shiori.readlog","shiori.settings"];
const SYNC_MIN_GAP=60000;   // 読書中は20秒ごとに保存が走るため、送信は間引く（KV無料枠の保護）
function syncCode(){ return localStorage.getItem(SYNC_LS_CODE)||""; }
function syncBase(){ const v=localStorage.getItem(SYNC_LS_BASE); return v==null?null:+v; }
function setSyncBase(t){ localStorage.setItem(SYNC_LS_BASE,String(t)); }
function syncDirtyAt(){ return +(localStorage.getItem(SYNC_LS_DIRTY)||0); }
function syncTouch(k){
  if(!SYNC_KEYS.includes(k)||!syncCode()) return;
  localStorage.setItem(SYNC_LS_DIRTY,String(Date.now()));
  schedulePush();
}
const saveCore=save;
save=function(k,v){ saveCore(k,v); syncTouch(k); };

function syncParse(s,def){ try{ return JSON.parse(s)??def; }catch(e){ return def; } }
function syncCollect(){
  const d={};
  d["shiori.shelf"]=localStorage.getItem("shiori.shelf")||"{}";
  d["shiori.readlog"]=localStorage.getItem("shiori.readlog")||'{"days":{}}';
  d["shiori.settings"]=JSON.stringify({theme:settings.theme, chatModel:settings.chatModel});  // キーとサイズは含めない
  return d;
}
function mergeShelf(A,B){   // 作品ごとに統合。進捗=大きい方、気になる=OR、ハイライト=hid単位の和集合
  const out={};
  for(const id of new Set([...Object.keys(A),...Object.keys(B)])){
    const a=A[id], b=B[id];
    if(!a||!b){ out[id]={...(a||b)}; continue; }
    const newerB=String(b.updated||"")>=String(a.updated||"");
    const e={...(newerB?a:b), ...(newerB?b:a)};   // 新しい側の値を優先しつつ、欠けは古い側で補う
    e.fraction=Math.max(a.fraction||0, b.fraction||0);
    if(a.checked||b.checked) e.checked=true;
    if(Array.isArray(a.highlights)||Array.isArray(b.highlights)){
      const hs=[...(a.highlights||[])], seen=new Set(hs.map(h=>h&&h.hid));
      (b.highlights||[]).forEach(h=>{ if(h&&h.hid&&!seen.has(h.hid)){ hs.push(h); seen.add(h.hid); } });
      e.highlights=hs;
    }
    out[id]=e;
  }
  return out;
}
function mergeSyncData(L,R,localNewer){
  const P=localNewer?L:R, S=localNewer?R:L;   // P=新しい側を優先
  const out={};
  out["shiori.shelf"]=JSON.stringify(mergeShelf(syncParse(L["shiori.shelf"],{}),syncParse(R["shiori.shelf"],{})));
  const la=syncParse(L["shiori.readlog"],{days:{}}).days||{}, rb=syncParse(R["shiori.readlog"],{days:{}}).days||{};
  const days={};   // 日ごとに大きい方＝二重計上を防ぐ（importDataと同じ）
  for(const d of new Set([...Object.keys(la),...Object.keys(rb)])) days[d]=Math.max(la[d]||0, rb[d]||0);
  out["shiori.readlog"]=JSON.stringify({days});
  out["shiori.settings"]=P["shiori.settings"]!=null?P["shiori.settings"]:S["shiori.settings"];
  return out;
}
function syncApply(d){
  if(d["shiori.shelf"]!=null) localStorage.setItem("shiori.shelf",d["shiori.shelf"]);
  if(d["shiori.readlog"]!=null) localStorage.setItem("shiori.readlog",d["shiori.readlog"]);
  if(d["shiori.settings"]!=null){
    const s=syncParse(d["shiori.settings"],{});
    if(s.theme) settings.theme=s.theme;
    if(s.chatModel) settings.chatModel=s.chatModel;
    saveCore("shiori.settings",settings);   // geminiKey・sizeはこの端末の値を維持
  }
  shelf=load("shiori.shelf",{});
  readLog=load("shiori.readlog",{days:{}});
  applyTheme(); renderLibrary();
}
let syncTimer=null, syncBusy=false, syncQueued=false, syncLastPush=0;
function schedulePush(){
  clearTimeout(syncTimer);
  const wait=Math.max(2500, SYNC_MIN_GAP-(Date.now()-syncLastPush));
  syncTimer=setTimeout(doPush, wait);
}
function syncStatusMsg(t){ const el=document.getElementById("syncStatus"); if(el) el.textContent=t; }
function syncTime(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return p(d.getHours())+":"+p(d.getMinutes()); }
async function adoptRemote(remote){
  const dirtyAt=syncDirtyAt();
  if(!dirtyAt){   // 未送信のローカル変更なし→リモートをそのまま採用（他端末での削除もここで反映される）
    syncApply(remote.data||{}); setSyncBase(remote.updatedAt);
    syncStatusMsg("同期済み（"+syncTime()+"）"); return;
  }
  // 両方に変更がある（衝突）→ 作品・日付ごとに統合マージして再送。この場合のみ削除が復活しうる
  const merged=mergeSyncData(syncCollect(),remote.data||{},dirtyAt>remote.updatedAt);
  syncApply(merged); setSyncBase(remote.updatedAt);
  await doPush();
}
async function doPush(){
  const code=syncCode(); if(!code) return;
  if(syncBusy){ syncQueued=true; return; }
  syncBusy=true; clearTimeout(syncTimer);
  try{
    readTick();   // 直近の読書時間も含めて送る
    const body={baseUpdatedAt:syncBase(), updatedAt:Date.now(), data:syncCollect()};
    const res=await fetch(SYNC_URL+code,{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    if(res.status===409){ const remote=await res.json(); syncBusy=false; await adoptRemote(remote); return; }
    if(!res.ok) throw new Error("HTTP "+res.status);
    syncLastPush=Date.now();
    setSyncBase(body.updatedAt); localStorage.removeItem(SYNC_LS_DIRTY);
    syncStatusMsg("同期済み（"+syncTime()+"）");
  }catch(e){
    syncStatusMsg("同期できませんでした（オフライン？）。次の保存時に自動で再送します。");
  }finally{
    syncBusy=false;
    if(syncQueued){ syncQueued=false; schedulePush(); }
  }
}
async function doPull(){
  const code=syncCode(); if(!code) return;
  try{
    const res=await fetch(SYNC_URL+code);
    if(res.status===404){ await doPush(); return; }   // クラウド側が空→この端末の記録を初回アップロード
    if(!res.ok) throw new Error("HTTP "+res.status);
    const remote=await res.json();
    if(remote.updatedAt!==syncBase()) await adoptRemote(remote);
    else if(syncDirtyAt()) await doPush();
    else syncStatusMsg("同期済み（"+syncTime()+"）");
  }catch(e){
    syncStatusMsg("同期できませんでした（オフライン？）。接続後に自動で再試行します。");
  }
}
/* --- 同期UI --- */
function syncNewCode(){
  const cs="ABCDEFGHJKMNPQRSTUVWXYZ23456789";   // 紛らわしい I/L/O/0/1 は使わない
  const buf=new Uint32Array(20); crypto.getRandomValues(buf);
  const s=[...buf].map(n=>cs[n%cs.length]);
  return [0,1,2,3,4].map(i=>s.slice(i*4,i*4+4).join("")).join("-");
}
function renderSyncUI(){
  const on=!!syncCode(), $=id=>document.getElementById(id);
  if(!$("syncCodeRow")) return;
  $("syncCodeRow").style.display=on?"":"none";
  $("syncCodeText").textContent=syncCode();
  $("syncIssueBtn").style.display=on?"none":"";
  $("syncEnterBtn").style.display=on?"none":"";
  $("syncNowBtn").style.display=on?"":"none";
  $("syncOffBtn").style.display=on?"":"none";
}
function syncIssue(){
  localStorage.setItem(SYNC_LS_CODE,syncNewCode());
  localStorage.removeItem(SYNC_LS_BASE);
  renderSyncUI(); syncStatusMsg("コードを発行しました。他の端末で「コードを入力」してください。");
  doPush();
}
function syncEnter(){
  const raw=prompt("他の端末で発行した同期コードを入力してください（例: ABCD-EFGH-JKMN-PQRS-TUVW）");
  if(raw==null) return;
  const code=raw.trim().toUpperCase();
  if(!/^[A-HJ-NP-Z2-9]{4}(-[A-HJ-NP-Z2-9]{4}){4}$/.test(code)){ alert("コードの形式が正しくありません。"); return; }
  localStorage.setItem(SYNC_LS_CODE,code);
  localStorage.removeItem(SYNC_LS_BASE);
  localStorage.setItem(SYNC_LS_DIRTY,String(Date.now()));   // この端末の記録もマージで残す
  renderSyncUI(); syncStatusMsg("同期しています…");
  doPull();
}
function syncNow(){ syncStatusMsg("同期しています…"); doPull(); }
function syncOff(){
  if(!confirm("この端末の同期を解除しますか？（データは消えません。クラウド上のデータも残ります）")) return;
  localStorage.removeItem(SYNC_LS_CODE); localStorage.removeItem(SYNC_LS_BASE); localStorage.removeItem(SYNC_LS_DIRTY);
  renderSyncUI();
}
function syncCopyCode(){
  navigator.clipboard?.writeText(syncCode()).then(()=>syncStatusMsg("コードをコピーしました。"),()=>{});
}
function syncInit(){
  if(syncCode()) doPull();
  document.addEventListener("visibilitychange",()=>{   // タブ復帰時に取得（端末の切替を想定）
    if(document.visibilityState==="visible"&&syncCode()&&!syncBusy) doPull();
  });
}

          '<li><b>メモ</b>・一覧は上部の<kbd><svg class=ic><use href=#ic-highlight /></svg> ノート</kbd>。<b>名文コレクション</b>(<kbd><svg class=ic><use href=#ic-collection /></svg> 名文集</kbd>)は全作品の引用を横断表示。</li>'+
          '<li><b>レビュー</b>(<kbd><svg class=ic><use href=#ic-pen /></svg></kbd>)で★と感想、<b>気になる</b>(<kbd><svg class=ic><use href=#ic-bookmark /></svg></kbd>)であとで読む登録。</li>'+
        '</ul>'+

        '<h4><svg class=ic><use href=#ic-compass /></svg> 選ぶ</h4>'+
        '<ul>'+
          '<li>各作品に<b>難易度（●）</b>と<b>読了目安（分）</b>。並べ替え・「はじめての一冊」で選べます。</li>'+
          '<li>棚の上に<b>次の一冊レコメンド</b>。<kbd><svg class=ic><use href=#ic-chart /></svg> 統計</kbd>で読書の記録も見られます。</li>'+
        '</ul>'+

        '<h4><svg class=ic><use href=#ic-save /></svg> 便利機能</h4>'+
        '<ul>'+
          '<li><b>バックアップ</b>：<kbd><svg class=ic><use href=#ic-settings /></svg> 設定</kbd>でしおり・ハイライト等を書き出し／読み込み（端末の引っ越しに）。</li>'+
          '<li><b>ホーム画面に追加</b>すると、アプリのように起動でき、<b>一度読んだ作品はオフラインでも</b>読めます。</li>'+
        '</ul>'+

        '<h4><svg class=ic><use href=#ic-sparkle /></svg> AIを使うには</h4>'+
        '<p>AIとの対話は、<kbd><svg class=ic><use href=#ic-settings /></svg> 設定</kbd>で<b>Geminiの無料APIキー</b>を入れると使えます（クレカ不要）。<a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> でGoogleログイン→「Create API key」。キーは<b>この端末内だけ</b>に保存され、外部には送られません。</p>'+

        '<div class="tip"><svg class=ic><use href=#ic-bulb /></svg> まずは「はじめての一冊」から一作開いて、わからない言葉をなぞって「<svg class=ic><use href=#ic-book /></svg>辞書」を試してみてください。</div>'+
      '</div>'+
    '</div>';
  document.body.appendChild(scrim);
}

function openStats(){
  const m=id=>META[id]||{min:0};
  let done=0, reading=0, hiCount=0, reviews=0, ratingSum=0, minutes=0, doneThisYear=0;
  const authorCount={}, thisYear=String(new Date().getFullYear());
  WORKS.forEach(w=>{
    const st=statusOf(w.id), r=shelf[w.id];
    if(st==="done"){ done++; minutes+=m(w.id).min; authorCount[w.author]=(authorCount[w.author]||0)+1;
      const d=(r&&(r.reviewDate||r.updated))||""; if(d.slice(0,4)===thisYear) doneThisYear++; }
    else if(st==="reading") reading++;
    if(r){ if(r.rating){ reviews++; ratingSum+=r.rating; }
      if(Array.isArray(r.highlights)) r.highlights.forEach(h=>{ if(h.text) hiCount++; }); }
  });
  const avg = reviews? (ratingSum/reviews).toFixed(1) : "—";
  const rs = readStats();
  const months = monthlyStats(6);
  const maxMo = Math.max(1, ...months.map(x=>x.min));
  const monthBars = months.some(x=>x.min>0)
    ? months.map(x=>`<div class="auth-bar"><span class="name">${x.label}</span><span class="track"><span class="fill" style="width:${Math.round(x.min/maxMo*100)}%"></span></span><span class="cnt">${x.min}分</span></div>`).join("")
    : `<div class="note">読書した月ごとの時間が、ここにグラフで出ます。</div>`;
  const authors=Object.entries(authorCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxA=authors.length?authors[0][1]:1;
  const bars=authors.map(([a,c])=>`<div class="auth-bar"><span class="name">${a}</span><span class="track"><span class="fill" style="width:${Math.round(c/maxA*100)}%"></span></span><span class="cnt">${c}</span></div>`).join("")
    || `<div class="note">読了した作品が増えると、ここに作者別が出ます。</div>`;
  const scrim=document.createElement("div"); scrim.className="scrim center"; scrim.onclick=(e)=>{ if(e.target===scrim) scrim.remove(); };
  scrim.innerHTML=`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="dhead"><h3><svg class=ic><use href=#ic-chart /></svg> 読書統計</h3><button class="icon-btn close" onclick="this.closest('.scrim').remove()">閉じる</button></div>
      <div class="dbody">
        <div class="stat-grid">
          <div class="stat-tile"><div class="num">${done}<small> / ${WORKS.length}</small></div><div class="lbl">読了した作品</div></div>
          <div class="stat-tile"><div class="num">${fmtHours(rs.totalMin)}</div><div class="lbl">実際の読書時間</div></div>
          <div class="stat-tile"><div class="num"><svg class=ic><use href=#ic-flame /></svg> ${rs.streak}<small> 日</small></div><div class="lbl">連続読書日数</div></div>
          <div class="stat-tile"><div class="num">${rs.days}<small> 日</small></div><div class="lbl">読書した日数</div></div>
          <div class="stat-tile"><div class="num">${doneThisYear}</div><div class="lbl">${thisYear}年の読了</div></div>
          <div class="stat-tile"><div class="num">${reading}</div><div class="lbl">読書中</div></div>
          <div class="stat-tile"><div class="num">${hiCount}</div><div class="lbl">ハイライト</div></div>
          <div class="stat-tile"><div class="num">★${avg}</div><div class="lbl">平均評価（${reviews}件）</div></div>
          <div class="stat-tile"><div class="num">${fmtHours(minutes)}</div><div class="lbl">読了ぶんの目安時間</div></div>
        </div>
        <div class="stat-head">月別の読書時間</div>
        ${monthBars}
        <div class="stat-head">作者別 読了数</div>
        ${bars}
      </div>
    </div>`;
  document.body.appendChild(scrim);
}

/* ---------- 名文コレクション ---------- */
function openCollection(){
  const groups=[];
  WORKS.forEach(w=>{ const r=shelf[w.id]; if(r&&Array.isArray(r.highlights)){ const hs=r.highlights.filter(h=>h.text); if(hs.length) groups.push({w, hs, last:(r.reviewDate||r.updated||"")}); } });
  groups.sort((a,b)=> b.last.localeCompare(a.last));
  const total=groups.reduce((s,g)=>s+g.hs.length,0);
  let body;
  if(!total){ body=`<div class="note">本文をなぞって「<svg class=ic><use href=#ic-highlight /></svg> ハイライト」を引くと、心に残った一文がここに集まります。全作品を横断して読み返せます。</div>`; }
  else body = groups.map(g=>{
      const items=g.hs.slice().reverse().map(h=>`<div class="coll-quote">${escapeHtml(h.text)}</div>${h.note&&h.note.trim()?`<div class="coll-note">${escapeHtml(h.note)}</div>`:``}`).join("");
      return `<div class="coll-work" data-wid="${g.w.id}">『${g.w.title}』 ${g.w.author} ›</div>${items}`;
    }).join("");
  const scrim=document.createElement("div"); scrim.className="scrim"; scrim.onclick=(e)=>{ if(e.target===scrim) scrim.remove(); };
  scrim.innerHTML=`
    <div class="drawer" onclick="event.stopPropagation()">
      <div class="dhead"><h3><svg class=ic><use href=#ic-collection /></svg> 名文コレクション${total?`（${total}）`:``}</h3><button class="icon-btn close" onclick="this.closest('.scrim').remove()">閉じる</button></div>
      <div class="dbody">${body}</div>
    </div>`;
  document.body.appendChild(scrim);
  scrim.querySelectorAll(".coll-work").forEach(el=> el.onclick=()=>{ const w=WORKS.find(x=>x.id===el.dataset.wid); scrim.remove(); if(w) openWork(w); });
}

/* ---------- utils ---------- */
function escapeHtml(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- boot ---------- */
applyTheme();
renderLibrary();
syncInit();
/* PWA: Service Worker 登録（オフライン対応・インストール可能に） */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}
