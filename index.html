<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>栞 ― 青空文庫コンシェルジュ</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#9a4b3f">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="栞">
<style>
  :root{
    --bg:#efe7d6; --paper:#f7f1e3; --ink:#2b2620; --sub:#7a6f5c;
    --line:#d8cdb4; --accent:#9a4b3f; --accent2:#c99a3e;
    --font-serif:"Yu Mincho","YuMincho","Hiragino Mincho ProN","Hiragino Mincho Pro","Noto Serif JP","MS PMincho",serif;
    --reader-size:22px; --reader-lh:2.0;
  }
  [data-theme="light"]{ --bg:#eceef2; --paper:#ffffff; --ink:#20242b; --sub:#6b7280; --line:#e2e5ea; --accent:#8a3f36; --accent2:#b8862f; }
  [data-theme="dark"]{ --bg:#14120f; --paper:#1b1813; --ink:#e6ddca; --sub:#9a8f78; --line:#2c281f; --accent:#d98a6a; --accent2:#d3ad5a; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font-serif);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow:hidden;
  }
  button{font-family:inherit; cursor:pointer}
  .hidden{display:none !important}

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0; height:calc(56px + env(safe-area-inset-top)); z-index:40;
    padding-top:env(safe-area-inset-top); box-sizing:border-box;
    display:flex; align-items:center; gap:14px; padding-left:18px; padding-right:18px;
    background:color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:baseline; gap:10px; cursor:pointer; user-select:none}
  .brand .logo{font-size:26px; font-weight:600; letter-spacing:.06em; color:var(--accent)}
  .brand .sub{font-size:11px; color:var(--sub); letter-spacing:.28em}
  .spacer{flex:1}
  .icon-btn{
    border:1px solid var(--line); background:var(--paper); color:var(--ink);
    border-radius:10px; padding:8px 12px; font-size:13px; line-height:1; white-space:nowrap;
    display:inline-flex; align-items:center; gap:6px; transition:.15s;
  }
  .icon-btn:hover{border-color:var(--accent); color:var(--accent)}
  .icon-btn.active{background:var(--accent); color:#fff; border-color:var(--accent)}

  /* ---------- library ---------- */
  .view{position:fixed; top:calc(56px + env(safe-area-inset-top)); left:0; right:0; bottom:0; overflow:auto}
  .library-wrap{max-width:1080px; margin:0 auto; padding:34px 24px 80px}
  .lib-hero{margin-bottom:26px}
  .lib-hero h1{font-size:30px; margin:0 0 8px; font-weight:600; letter-spacing:.04em}
  .lib-hero p{margin:0; color:var(--sub); font-size:14px; line-height:1.9}
  .search{
    margin:22px 0 8px; display:flex; gap:10px; align-items:center;
  }
  .search input{
    flex:1; padding:12px 16px; border:1px solid var(--line); border-radius:12px;
    background:var(--paper); color:var(--ink); font-family:inherit; font-size:15px;
  }
  .search input:focus{outline:none; border-color:var(--accent)}
  .lib-count{font-size:12.5px; color:var(--sub); margin:0 2px 20px}
  .recos{margin:6px 0 26px}
  .recos h2{font-size:15px; font-weight:600; letter-spacing:.06em; margin:0 0 13px; color:var(--ink)}
  .recos .reco-row{display:flex; gap:14px; overflow-x:auto; padding-bottom:8px; scrollbar-width:thin}
  .reco-card{flex:0 0 auto; width:212px; background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:15px 16px 14px; cursor:pointer; transition:.16s}
  .reco-card:hover{transform:translateY(-3px); border-color:var(--accent); box-shadow:0 10px 26px -18px rgba(0,0,0,.45)}
  .reco-card .rc-title{font-size:17px; font-weight:600; letter-spacing:.04em; line-height:1.3}
  .reco-card .rc-author{font-size:12px; color:var(--sub); margin-top:3px}
  .reco-card .rc-reason{font-size:12px; color:var(--accent); background:color-mix(in srgb,var(--accent) 9%, transparent); border-radius:9px; padding:7px 10px; margin-top:11px; line-height:1.55}
  .reco-card .rc-meta{font-size:11px; color:var(--sub); margin-top:10px; letter-spacing:.02em}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:18px}
  .card{
    position:relative; background:var(--paper); border:1px solid var(--line);
    border-radius:16px; padding:20px 18px 18px; cursor:pointer; overflow:hidden;
    transition:.18s; min-height:180px; display:flex; flex-direction:column;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--accent); box-shadow:0 10px 30px -18px rgba(0,0,0,.45)}
  .card .spine{position:absolute; top:0; right:0; bottom:0; width:6px; background:linear-gradient(var(--accent),var(--accent2))}
  .card .vtitle{
    writing-mode:vertical-rl; font-size:22px; font-weight:600; letter-spacing:.08em;
    height:120px; margin-left:auto; line-height:1.25;
  }
  .card .author{margin-top:auto; font-size:12.5px; color:var(--sub); letter-spacing:.05em}
  .card .badge{position:absolute; top:14px; left:16px; font-size:10px; color:var(--sub)}
  .card.readmark::after{content:"栞"; position:absolute; top:-2px; left:14px; font-size:20px; color:var(--accent);}
  .author-head{grid-column:1/-1; font-size:13px; color:var(--sub); letter-spacing:.12em; border-bottom:1px solid var(--line); padding:14px 2px 8px; margin-top:6px}
  .card .meta{display:flex; align-items:center; gap:9px; margin-top:9px; font-size:11px; color:var(--sub); flex-wrap:wrap}
  .card .diffm{letter-spacing:1px; font-size:9px; white-space:nowrap}
  .card .diffm .f{color:#6f8fb0} .card .diffm .e{color:var(--line)}
  .card .rt{white-space:nowrap}
  .card .btag{background:var(--accent2); color:#fff; padding:2px 7px; border-radius:20px; font-size:10px; letter-spacing:.03em}
  .card .checkbtn{position:absolute; top:10px; left:12px; z-index:3; border:1px solid var(--line); background:var(--paper); color:var(--sub);
    font-size:11px; line-height:1; padding:5px 9px 5px 8px; border-radius:20px; display:inline-flex; align-items:center; gap:4px; transition:.15s}
  .card .checkbtn:hover{border-color:var(--accent2); color:var(--accent2)}
  .card .checkbtn.on{background:var(--accent2); color:#fff; border-color:var(--accent2)}
  .card .checkbtn.on span{font-weight:600}
  .card .statusline{display:flex; align-items:center; gap:8px; margin-top:7px; font-size:11px}
  .card .stt{padding:2px 9px; border-radius:20px; border:1px solid var(--line); color:var(--sub); white-space:nowrap}
  .card .stt.reading{color:var(--accent); border-color:var(--accent)}
  .card .stt.done{background:var(--accent); color:#fff; border-color:var(--accent)}
  .rev-stars{letter-spacing:1px; font-size:11px}
  .rev-stars .on{color:var(--accent2)} .rev-stars .off{opacity:.28}
  .rate{display:flex; align-items:center; gap:2px; flex-wrap:wrap}
  .star-btn{border:none; background:transparent; font-size:32px; line-height:1; color:var(--line); cursor:pointer; padding:0 2px; transition:transform .1s}
  .star-btn.on{color:var(--accent2)}
  .star-btn:hover{transform:scale(1.12)}
  .rate-label{margin-left:12px; font-size:13px; color:var(--sub)}
  #reviewText{width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font-family:inherit; font-size:14px; resize:vertical; line-height:1.8}
  .finish-toast{position:absolute; left:50%; bottom:calc(74px + env(safe-area-inset-bottom)); transform:translateX(-50%); z-index:30;
    width:min(92vw,540px); background:var(--paper); border:1px solid var(--line); box-shadow:0 16px 42px -14px rgba(0,0,0,.6);
    border-radius:16px; padding:14px 16px; animation:slideIn .3s ease}
  .finish-toast .ft-top{display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:14px; font-weight:600; color:var(--ink)}
  .finish-toast .ft-close{border:none; background:transparent; color:var(--sub); font-size:15px; cursor:pointer; padding:4px 6px; line-height:1}
  .finish-toast .ft-recos{margin:11px 0 12px}
  .finish-toast .ft-recos-label{font-size:12px; color:var(--sub); margin-bottom:8px}
  .finish-toast .ft-recos .reco-row{display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; scrollbar-width:thin}
  .finish-toast .ft-recos .reco-card{width:172px; padding:11px 12px}
  .finish-toast .ft-actions{display:flex; gap:10px}
  .finish-toast .ft-yes{border:none; background:var(--accent); color:#fff; padding:9px 16px; border-radius:10px; font-size:13px; cursor:pointer}
  .finish-toast .ft-no{border:1px solid var(--line); background:var(--bg); color:var(--sub); padding:9px 14px; border-radius:10px; font-size:13px; cursor:pointer}
  .lib-controls{display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin:0 2px 6px}
  .lib-controls .lbl{font-size:12.5px; color:var(--sub)}
  .lib-controls select,.chipbtn{padding:8px 12px; border:1px solid var(--line); border-radius:10px; background:var(--paper); color:var(--ink); font-family:inherit; font-size:13px}
  .chipbtn{cursor:pointer; transition:.15s}
  .chipbtn:hover{border-color:var(--accent2)}
  .chipbtn.on{background:var(--accent2); color:#fff; border-color:var(--accent2)}

  /* ---------- reader ---------- */
  #reader.view{overflow:hidden; background:var(--bg)}
  .stage{position:absolute; top:8px; left:8px; right:8px; bottom:calc(60px + env(safe-area-inset-bottom)); overflow:hidden; border-radius:14px;
    background:var(--paper); box-shadow:0 4px 40px -24px rgba(0,0,0,.5); border:1px solid var(--line);}
  .book{
    position:absolute; top:42px; right:52px; bottom:42px; left:auto;
    writing-mode:vertical-rl; -webkit-writing-mode:vertical-rl;
    font-size:var(--reader-size); line-height:var(--reader-lh); color:var(--ink);
    transition:transform .38s cubic-bezier(.2,.7,.2,1);
    text-align:justify;
    -webkit-touch-callout:none;                 /* iOS長押しの標準メニューを抑制 */
    -webkit-user-select:text; user-select:text; /* PCではドラッグ選択可 */
  }
  /* タッチ端末では標準選択を無効化（iOS標準メニューを消し、長押し=一文選択の独自方式にする） */
  @media (pointer:coarse){ .book{ -webkit-user-select:none; user-select:none; } }
  .book mark.selpreview{ background:rgba(120,150,200,.4); color:inherit; border-radius:2px; }
  .book h1.title{font-size:1.5em; font-weight:600; margin:0 1.4em 0 0; letter-spacing:.08em}
  .book h2.author{font-size:.82em; color:var(--sub); margin:0 1.6em 0 0}
  .book .main_text{margin:0}
  .book p{margin:0}
  .book rt{font-size:.72em; color:var(--ink); opacity:.95; line-height:1.05; letter-spacing:0}
  .book img.gaiji{width:1em; height:1em; vertical-align:-.1em}
  .stage .page-turn{position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; z-index:15; cursor:pointer;
    display:flex; align-items:center; justify-content:center; border-radius:50%;
    background:color-mix(in srgb,var(--paper) 78%, transparent); border:1px solid var(--line);
    box-shadow:0 3px 12px -6px rgba(0,0,0,.5); color:var(--sub); opacity:.5;
    transition:opacity .15s, border-color .15s, color .15s; -webkit-tap-highlight-color:transparent}
  .stage .page-turn:hover,.stage .page-turn:active{opacity:1; border-color:var(--accent); color:var(--accent)}
  .stage .pt-left{left:10px} .stage .pt-right{right:10px}
  .stage .edge-hint{font-size:26px; line-height:1}

  .readbar{position:absolute; left:0; right:0; bottom:0; min-height:56px; z-index:20;
    padding-bottom:env(safe-area-inset-bottom);
    display:flex; align-items:center; gap:16px; padding-left:20px; padding-right:20px;
    background:color-mix(in srgb,var(--paper) 92%, transparent); border-top:1px solid var(--line); backdrop-filter:blur(6px)}
  .readbar .rtitle{font-size:13px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:24vw}
  .progress{flex:1; height:26px; position:relative; cursor:pointer; touch-action:none; display:flex; align-items:center}
  .progress .ptrack{position:relative; width:100%; height:8px; background:var(--line); border-radius:6px; overflow:hidden}
  .progress .bar{position:absolute; top:0; bottom:0; right:0; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:6px; width:0%}
  .progress .knob{position:absolute; top:50%; left:0%; width:18px; height:18px; margin-left:-9px; transform:translateY(-50%);
    background:var(--paper); border:2px solid var(--accent); border-radius:50%; box-shadow:0 2px 7px -2px rgba(0,0,0,.55); pointer-events:none; transition:left .1s ease}
  .progress:active .knob{transform:translateY(-50%) scale(1.15)}
  .pageno{font-size:12.5px; color:var(--ink); min-width:110px; text-align:center; font-variant-numeric:tabular-nums; font-weight:600}

  /* ---------- floating selection menu ---------- */
  #seltip,#hltip{position:fixed; z-index:60; transform:translate(-50%,-118%); display:flex; gap:2px;
    background:var(--ink); border-radius:12px; padding:4px; box-shadow:0 10px 28px -10px rgba(0,0,0,.6)}
  #seltip button,#hltip button{border:none; background:transparent; color:#fff; font-size:16px; line-height:1;
    padding:8px 10px; border-radius:8px; display:inline-flex; align-items:center; gap:5px; cursor:pointer}
  #seltip button span,#hltip button span{font-size:11.5px; letter-spacing:.03em}
  #seltip button:hover,#hltip button:hover{background:rgba(255,255,255,.16)}
  #hltip button.del span{color:#ff9b8a}
  #seltip::after,#hltip::after{content:""; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%) rotate(45deg); width:10px; height:10px; background:var(--ink)}

  /* ---------- highlights (本文中のマーカー) ---------- */
  .book mark.hl{ background:rgba(224,166,61,.42); color:inherit; border-radius:2px; cursor:pointer; }
  .book mark.hl[data-color="pink"]{ background:rgba(200,90,110,.34); }
  .book mark.hl[data-color="blue"]{ background:rgba(91,127,176,.34); }
  .book mark.hl[data-color="green"]{ background:rgba(111,155,116,.36); }
  .book mark.hl.hasnote{ box-shadow:0 2px 0 -0.5px var(--accent) inset; }

  /* ---------- notes / ask panels ---------- */
  .note-item{ border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:12px; background:var(--bg); }
  .note-item .quote{ font-family:var(--font-serif); font-size:14px; line-height:1.7; color:var(--ink);
    border-right:3px solid var(--accent2); padding-right:10px; margin-bottom:9px; }
  .note-item .quote.empty{ border-color:var(--line); color:var(--sub); font-style:italic; }
  .note-item textarea{ width:100%; border:1px solid var(--line); border-radius:9px; background:var(--paper);
    color:var(--ink); font-family:inherit; font-size:13.5px; padding:9px 11px; resize:vertical; line-height:1.7; min-height:44px; }
  .note-item .row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
  .note-item .row .date{ font-size:11px; color:var(--sub); }
  .note-item .row .del{ margin-left:auto; border:1px solid var(--line); background:var(--bg); color:var(--sub);
    border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer; }
  .note-item .row .del:hover{ border-color:var(--accent); color:var(--accent); }
  .swatch-row{ display:flex; gap:7px; margin-top:9px; }
  .swatch{ width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
  .swatch.on{ border-color:var(--ink); }

  .ask-quotes{ font-family:var(--font-serif); font-size:14px; line-height:1.7; color:var(--ink);
    background:var(--bg); border-left:3px solid var(--accent2); padding:9px 12px; border-radius:8px; margin-bottom:12px; }
  .ask-chips{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; }
  .ask-chips button{ border:1px solid var(--line); background:var(--bg); color:var(--ink); border-radius:20px;
    padding:7px 12px; font-size:12.5px; cursor:pointer; }
  .ask-chips button:hover{ border-color:var(--accent); color:var(--accent); }
  .ask-log{ display:flex; flex-direction:column; gap:12px; margin-top:6px; }
  .ask-q{ align-self:flex-end; max-width:85%; background:var(--accent); color:#fff; border-radius:14px 14px 4px 14px;
    padding:9px 13px; font-size:13.5px; line-height:1.6; }
  .ask-a{ align-self:flex-start; max-width:92%; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:14px 14px 14px 4px; padding:11px 13px; font-size:14px; line-height:1.9; white-space:pre-wrap; }
  .ask-form{ display:flex; gap:8px; margin-top:14px; }
  .ask-form textarea{ flex:1; border:1px solid var(--line); border-radius:11px; background:var(--bg); color:var(--ink);
    font-family:inherit; font-size:14px; padding:10px 12px; resize:none; line-height:1.6; max-height:120px; }
  .ask-send{ border:none; background:var(--accent); color:#fff; border-radius:11px; padding:0 16px; font-size:14px; cursor:pointer; }
  .key-notice{ background:var(--bg); border:1px dashed var(--line); border-radius:11px; padding:13px; font-size:13px;
    color:var(--sub); line-height:1.8; margin-bottom:12px; }
  .key-notice b{ color:var(--ink); }

  /* 読書統計 */
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .stat-tile{ background:var(--bg); border:1px solid var(--line); border-radius:14px; padding:14px 15px; }
  .stat-tile .num{ font-size:27px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1.1; }
  .stat-tile .num small{ font-size:14px; font-weight:600; color:var(--sub); }
  .stat-tile .lbl{ font-size:12px; color:var(--sub); margin-top:5px; letter-spacing:.02em; }
  .stat-head{ font-size:13px; color:var(--sub); letter-spacing:.08em; margin:6px 0 12px; }
  .auth-bar{ display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px; }
  .auth-bar .name{ width:6.5em; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .auth-bar .track{ flex:1; height:9px; background:var(--line); border-radius:6px; overflow:hidden; }
  .auth-bar .fill{ height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:6px; }
  .auth-bar .cnt{ width:2.6em; text-align:right; color:var(--sub); font-variant-numeric:tabular-nums; }

  /* 名文コレクション */
  .coll-work{ font-size:13px; font-weight:600; color:var(--accent); margin:18px 0 10px; cursor:pointer; display:inline-block; }
  .coll-work:first-child{ margin-top:0; }
  .coll-quote{ font-family:var(--font-serif); font-size:14.5px; line-height:1.85; color:var(--ink);
    border-right:3px solid var(--accent2); padding-right:11px; margin-bottom:6px; }
  .coll-note{ font-size:12.5px; color:var(--sub); background:var(--bg); border-radius:8px; padding:7px 10px; margin-bottom:13px; line-height:1.65; }

  /* 使い方・ヘルプ */
  .help h4{ font-size:14px; margin:20px 0 8px; color:var(--accent); letter-spacing:.03em; display:flex; align-items:center; gap:7px; }
  .help h4:first-child{ margin-top:2px; }
  .help p{ font-size:13.5px; line-height:1.85; color:var(--ink); margin:0 0 6px; }
  .help ul{ margin:0 0 4px; padding-left:1.25em; }
  .help li{ font-size:13.5px; line-height:1.8; color:var(--sub); margin-bottom:4px; }
  .help li b{ color:var(--ink); font-weight:600; }
  .help .tip{ font-size:12px; color:var(--sub); background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:9px 11px; margin:6px 0 4px; line-height:1.7; }
  .help kbd{ font-family:inherit; background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:1px 7px; font-size:12.5px; color:var(--ink); }

  /* ---------- drawers / modals ---------- */
  .scrim{position:fixed; inset:0; z-index:70; background:rgba(20,16,10,.42); backdrop-filter:blur(2px); display:flex; justify-content:flex-end}
  .scrim.center{align-items:center; justify-content:center}
  .drawer{width:min(420px,92vw); height:100%; background:var(--paper); border-left:1px solid var(--line);
    display:flex; flex-direction:column; animation:slideIn .28s ease}
  @keyframes slideIn{from{transform:translateX(30px); opacity:.4}to{transform:none; opacity:1}}
  .modal{width:min(560px,94vw); max-height:88vh; overflow:auto; background:var(--paper); border-radius:18px; border:1px solid var(--line); animation:slideIn .2s ease}
  .dhead{display:flex; align-items:center; gap:10px; padding:18px 20px; border-bottom:1px solid var(--line)}
  .dhead h3{margin:0; font-size:16px; font-weight:600; letter-spacing:.04em}
  .dhead .close{margin-left:auto}
  .dbody{padding:18px 20px; overflow:auto; flex:1}

  .field input[type=text],.field input[type=password],.field select{
    width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); font-family:inherit; font-size:14px}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{flex:1; min-width:70px; padding:10px; border:1px solid var(--line); background:var(--bg); border-radius:10px; color:var(--ink); font-size:13px}
  .seg button.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .note{font-size:11.5px; color:var(--sub); line-height:1.7; margin-top:6px}
  .btn-primary{width:100%; padding:12px; border:none; border-radius:11px; background:var(--accent); color:#fff; font-size:14px; letter-spacing:.05em}
  .btn-ghost{width:100%; padding:11px; border:1px solid var(--line); border-radius:11px; background:var(--bg); color:var(--ink); font-size:13px}
  .btn-ghost:hover{border-color:var(--accent); color:var(--accent)}
  .ai-out a{color:var(--accent)}

  /* AI assistant drawer */
  .ai-tabs{display:flex; gap:8px; padding:14px 20px 0}
  .ai-tabs button{flex:1; padding:9px; border:1px solid var(--line); background:var(--bg); border-radius:10px 10px 0 0; border-bottom:none; font-size:12.5px; color:var(--sub)}
  .ai-tabs button.on{background:var(--paper); color:var(--accent); font-weight:600}
  .ai-out{white-space:pre-wrap; line-height:1.95; font-size:14.5px; margin-top:6px}
  .ai-out.placeholder{color:var(--sub)}
  .illust{width:100%; aspect-ratio:1/1; border-radius:14px; border:1px solid var(--line); overflow:hidden; background:var(--bg); display:flex; align-items:center; justify-content:center}
  .illust img{width:100%; height:100%; object-fit:cover}
  .illust svg{width:100%; height:100%; display:block}
  .spin{width:20px; height:20px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .8s linear infinite; display:inline-block; vertical-align:-4px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .demo-tag{display:inline-block; font-size:10px; letter-spacing:.1em; color:#fff; background:var(--accent2); padding:2px 7px; border-radius:6px; margin-left:8px; vertical-align:2px}

  .loading-full{position:absolute; inset:0; z-index:15; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    background:var(--paper); color:var(--ink); font-size:15px; line-height:1.9; text-align:center; padding:24px}
  .loading-full .spin{width:26px; height:26px; border-width:3px}
  .loading-full #readerLoadingMsg{max-width:22em}

  @media (max-width:640px){
    .book{right:22px; top:24px; bottom:24px}
    .book rt{font-size:.85em}
    .brand .sub{display:none}
    .brand .logo{font-size:23px}
    .topbar{gap:6px; padding-left:10px; padding-right:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none}
    .topbar::-webkit-scrollbar{display:none}
    .brand,.icon-btn,.spacer{flex:0 0 auto}
    .spacer{flex:1 1 auto; min-width:4px}
    .icon-btn{padding:8px 9px; font-size:16px}
    .btl{display:none}
    .lib-controls{gap:7px}
    .lib-controls select,.chipbtn{padding:7px 9px; font-size:12.5px}
    .library-wrap{padding:22px 14px 72px}
    .lib-hero h1{font-size:24px}
    .drawer{width:100vw}
    .readbar{gap:10px; padding:0 12px}
    .readbar .rtitle{max-width:34vw}
  }
  /* ---- カスタムアイコン（SVGスプライト・currentColorでテーマに追従） ---- */
  .ic{width:1.12em;height:1.12em;display:inline-block;vertical-align:-.18em;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .icon-btn .ic{width:1.28em;height:1.28em;vertical-align:-.24em}
  .ic .fillc{fill:currentColor;stroke:none}

/* あらすじ・解説（各作品を読んで書き下ろし。ネタバレ控えめ） */
const SUMMARIES = {
  rashomon:"平安末期、荒廃した羅生門の下で雨宿りする下人。飢えて盗人になるか迷う彼は、楼上で死人の髪を抜く老婆と出会う。生きるための「悪」をめぐる問答の果てに、下人の心が動く。人間のエゴイズムを鋭くえぐる芥川の代表作。",
  kumonoito:"地獄に落ちた大泥棒カンダタ。生前にただ一度、蜘蛛を助けた善行ゆえに、釈迦がそっと垂らした一本の糸。それにすがって這い上がろうとするが、後に続く亡者たちを見て思わず叫んだ一言が、彼の運命を分ける。因果と慈悲の物語。",
  toshishun:"洛陽の若者・杜子春は、仙人の導きで大金を得ては使い果たす。やがて仙人になる修行として「何があっても声を出すな」と試され、地獄の責め苦にも耐えるが、ある光景の前で思わず声を上げてしまう。人としての情を問う説話。",
  jigokuhen:"傲慢な天才絵師・良秀は、「地獄変」の屏風を描くため、地獄の責め苦をこの目で見せよと大殿に迫る。芸術の完成と引き換えに、彼は最も大切なものを失うことになる。芸術至上主義の狂気と業を描く傑作。",
  yabunonaka:"藪の中で見つかった武士の死体。盗人、妻、そして死者の霊——三者の証言はことごとく食い違い、誰が真実を語っているのか分からない。「藪の中」という言葉の語源にもなった、多視点による人間心理の傑作。",
  kappa:"精神を病んだ患者が語る、河童の国での見聞録。出産や恋愛、宗教や芸術、資本主義——あらゆる価値観を反転させた河童の世界を通して、人間社会と文明を痛烈に風刺する、芥川晩年の異色作。",
  imogayu:"誰からも侮られる冴えない下級武士。「芋粥を飽きるほど食べてみたい」というささやかな夢が、ある日あっけなく叶えられようとしたとき、彼の心に去来したものは。人間の欲望のはかない機微を描く。",
  hana_a:"長すぎる鼻に思い悩む僧・禅智内供。あれこれ試してついに鼻を短くすることに成功するが、周囲の反応はかえって彼を苦しめる。人の心にひそむ「傍観者の利己主義」を、軽妙な筆致で描き出す。",
  mikan:"汽車の中、陰鬱な気分の「私」の前に座った、野暮ったい小娘。トンネルを抜けた踏切で、彼女が窓から投げたいくつかの蜜柑が、思いがけず温かい情景を生む。短くも鮮烈な余韻を残す一編。",
  torokko:"八歳の良平は、工事現場のトロッコに憧れ、土工に混じって遠くまで押していく。夢中で進むうち、いつしか帰り道の遠さに気づいたとき、幼い心を襲う心細さと恐怖。子供の心理を精緻に描く。",
  meros:"暴君の不信を正そうとして捕らえられたメロス。妹の結婚式のため、親友を人質に三日の猶予を得る。約束の刻限へ、増水した川も山賊も越えて走り続ける。友情と信実を高らかにうたう名作。",
  ningen:"「恥の多い生涯を送って来ました」。人を恐れて道化を演じ、酒と女と薬に溺れ、人間の営みにどうしても馴染めぬまま破滅へ向かう葉蔵の手記。太宰文学の到達点とされる、痛切な自伝的告白。",
  shayo:"没落した貴族の一家。病身の母、麻薬に溺れる弟・直治、そして新しい生き方のために「恋と革命」に賭けようとする娘・かず子。滅びゆく者と、なお生きようとする者を描く、戦後文学の代表作。",
  fugaku:"御坂峠の茶屋に滞在する「私」が、富士を眺めて過ごす日々。見合いや人々との交流のなかで、月並みなはずの富士がふと心に沁みる瞬間を捉える。「富士には、月見草がよく似合う」。清々しい佳品。",
  viyon:"放蕩無頼の詩人を夫に持つ妻。夫がしでかした金の不始末を償うため、彼女は飲み屋で働き始める。それでもしたたかに、明るく生き抜こうとする女性の視点から、戦後の混乱と人間の可笑しみを描く。",
  joshi:"ある一日の、多感な少女の朝の目覚めから夜眠りにつくまで。揺れ動く自意識、母への複雑な思い、ささやかな喜びと嫌悪——移ろう心の動きを、みずみずしい独白体でつづった一編。",
  kakekomi:"「申し上げます。あの人は、酷い。」——イエスを裏切ったユダが、激しい愛と憎しみを一気にまくし立てる。告発とも懺悔ともつかぬ独白を通して、裏切り者の心理を鮮烈に描き出す異色作。",
  outo:"子だくさんの作家の家庭。父としての務めに倦み、酒場へと逃げていく「私」の、苦く重い一日。「子供より親が大事、と思いたい」。家庭人の弱さと哀しみをにじませる、太宰晩年の一編。",
  otogi:"空襲の防空壕で、絵本を子に読み聞かせる父。その頭の中で、昔話が思いがけない物語へと膨らんでいく。「浦島さん」「カチカチ山」など誰もが知る昔話を、太宰一流の皮肉と洞察で語り直した傑作。",
  kokoro:"「私」が鎌倉で出会った、謎めいた「先生」。その深い孤独の裏には、親友Kと一人の女性をめぐる、生涯忘れえぬ罪の記憶があった。明治の精神とエゴイズム、そして贖罪を描く漱石の代表作。",
  neko:"「吾輩は猫である。名前はまだ無い」。中学教師・苦沙弥先生の家に住みついた猫の目を通して、明治の知識人たちの滑稽であわれな生態を風刺的につづる、諧謔と機知にみちた長編。",
  botchan:"正義感が強く無鉄砲な江戸っ子の「坊っちゃん」が、四国の中学へ数学教師として赴任。狸だ、赤シャツだと渾名をつけた同僚たちを相手に繰り広げる痛快な騒動。歯切れのよい文体で人気の一作。",
  sanshiro:"熊本から上京した青年・三四郎が、東京の大学生活で出会う学問、友情、そして謎めいた女性・美禰子。近代化していく都会のなかで揺れ動く、若者の淡い恋と成長を瑞々しく描く前期三部作の第一作。",
  sorekara:"働かず親の援助で暮らす高等遊民・代助。かつて自ら友人に譲った女性・三千代への愛が再び燃え上がり、世間の道徳と自らの本心の間で、彼はついに重大な決断を迫られる。前期三部作の第二作。",
  mon:"ひっそりと寄り添って暮らす宗助とお米の夫婦。だがその静かな平穏の陰には、人には言えぬ過去があった。心の安らぎを求めて禅寺の門をたたく宗助を描く、しみじみと静謐な前期三部作の完結作。",
  kusamakura:"「智に働けば角が立つ」。俗世を離れて山中の温泉宿を訪れた画工が、浮世離れした美しい女性・那美と出会う。物語よりも絵画的・詩的な世界を追い求めた、漱石の唱える「非人情」の小説。",
  yumejuya:"「こんな夢を見た」。幻想的で、どこか不気味な十の夢を連ねた掌編集。死んだ女を百年待つ話、運慶が仁王を彫り出す話——象徴とイメージに満ちた、漱石の異色作。",
  ginga:"孤独な少年ジョバンニは、祭りの夜、親友カムパネルラとともに、銀河をゆく不思議な列車に乗る。美しくも哀しい星々の旅の果てに、彼が知る「ほんとうのさいわい」とは。賢治の代表作。",
  chumon:"山奥で道に迷った二人の紳士が見つけた、立派な西洋料理店。「当店は注文の多い料理店です」。扉を進むごとに突きつけられる奇妙な注文——その本当の意味に、二人はやがて気づく。皮肉のきいた童話。",
  gauche:"楽団でいつも下手だと叱られる、セロ弾きのゴーシュ。夜ごと一人で練習する彼のもとへ、猫やかっこう、狸の子らが次々と訪ねてくる。動物たちとの奇妙な交流のなかで、彼の演奏が変わっていく。",
  matasaburo:"山あいの小さな分校に、転校してきた不思議な少年・高田三郎。子供たちは、彼こそ風の精「風の又三郎」ではないかと噂する。風とともに現れ、風とともに去っていく少年をめぐる物語。",
  yodaka:"醜いと蔑まれ、鷹にまで名を変えろと迫られるよだか。生きるために虫を食べることにすら苦しんだ彼は、遠い空のかなたをめざして飛び続け、ついに一つの青い星となって燃える。切なくも美しい童話。",
  donguri:"一郎のもとに届いた、山猫からの奇妙なはがき。裁判に呼ばれて山へ向かうと、どんぐりたちが「誰が一番えらいか」で大もめしていた。一郎が下したとんちのきいた名判決とは。愉快であたたかい童話。",
  otsuberu:"強欲な地主オツベルは、迷い込んできた白い象を言葉巧みにだまし、こき使う。やがて弱り果てた白象が、仲間の象たちに助けを求めたとき——。搾取と解放を寓話的に描く。「ある牛飼いがものがたる」。",
  budori:"冷害で家族を失った少年ブドリ。火山局で働きながら学び、飢饉に苦しむ農民たちを救うために行動する。自らを犠牲にしてでも人々の幸福を願う、賢治の理想が結晶した感動的な物語。",
  maihime:"ドイツ留学中のエリート官吏・太田豊太郎は、貧しい踊り子エリスと恋に落ちる。だが立身出世と愛のあいだで心は激しく揺れ、彼は重い選択を迫られる。近代的自我の目覚めと、その挫折を描く名作。",
  takasebune:"弟殺しの罪で島流しになる喜助を、高瀬舟で護送する同心・庄兵衛。ところが喜助は不思議なほど穏やかだった。その事情を聞くうちに、庄兵衛は「罪」とは何か、「安楽死」とは何かを問い始める。",
  sansho:"人買いにさらわれ、山椒大夫のもとで奴隷として過酷に働かされる姉・安寿と弟・厨子王。弟を逃がすため、自らを犠牲にする姉。中世の説経節「さんせう太夫」を、鴎外が格調高く小説に結晶させた一編。",
  gan:"高利貸しの妾となった娘・お玉。窓辺から日々見かける医学生・岡田に、彼女はひそかな思いを寄せる。だがその淡い恋は、ある小さな偶然によって、ついに実らぬまま終わる。明治の東京を舞台にした悲恋。",
  lemon:"得体の知れない憂鬱に取り憑かれた「私」。ある日、果物屋で買った一個の檸檬を手に丸善へ入り、画本を高く積み上げて、その上にそっと檸檬を置く。「私」だけの奇妙な爆弾。感覚の冴えわたる名品。",
  sakura:"「桜の樹の下には屍体が埋まっている!」——満開の桜のあまりの美しさに感じる、あの不安の正体を、屍体の幻視によって解き明かそうとする。鮮烈なイメージに貫かれた、散文詩のような短編。",
  sangetsu:"詩人として名を成す夢に破れ、自尊心ゆえに人と交われなかった李徴。ある夜、彼は虎へと姿を変えてしまう。旧友との思わぬ再会のなかで、己の運命と「臆病な自尊心」を語る。中国故事に材をとる名作。",
  meijin:"天下一の弓の名人になろうと志す紀昌。師のもとで厳しい修行を重ね、ついにたどり着いた究極の境地は、なんと「弓の存在すら忘れる」ことだった。技を極めた先にある「不射之射」を描く飄逸な寓話。",
  deshi:"血気盛んな侠客・子路は、孔子に論破されてその弟子となる。師を心から敬愛しながらも、自らの信念をつらぬき、乱世を実直に生き抜いた子路の生涯。師弟の情を格調高くつづった一編。",
  riryo:"匈奴に敗れて降伏した将軍・李陵、彼を弁護して宮刑に処された司馬遷、節を守り抜いて異郷に抑留され続けた蘇武。過酷な運命に対する三人三様の生き方を対比的に描く、中島敦の代表作。",
  takekurabe:"吉原遊郭のほとりの町で、大人になりゆく子供たちの淡い交流。気の強い美登利と、僧の子・信如。互いに惹かれ合いながらも、それぞれの定められた道ゆえにすれ違っていく初恋を、美しくせつなく描く。",
  nigorie:"銘酒屋で客をとって働く女・お力。彼女に入れあげて没落した男・源七との、断ち切れぬ腐れ縁。明治の世の底辺で懸命に生きる女の、やりきれない哀しみと宿命を描く。",
  jusanya:"十三夜の月の美しい晩、嫁ぎ先での夫の冷たい仕打ちに耐えかね、離縁を願い出ようと実家に帰ってきたお関。だが親に諭され、再び戻る帰り道、偶然乗った人力車の車夫は思いがけぬ人物だった。女の宿命を描く。",
  daraku:"「生きよ、堕ちよ」。敗戦後の混乱のなか、天皇制や武士道といった既成の道徳や美徳を否定し、人間は堕落しきることによってこそ、本当の自分自身を見いだせると説いた、戦後を象徴する評論。",
  hakuchi:"戦時下、うらぶれた町に暮らす男・伊沢のもとへ、白痴の女が転がり込んでくる。空襲の炎のなかを、その女を連れて逃げまどう一夜を通して、人間の本能と、時代の虚無を生々しく描く。",
  koya:"旅の若い僧が語る、飛騨の山中での怪異の一夜。道に迷った先の一軒家に住む妖しく美しい女は、言い寄る男たちを獣に変えてしまうという。幻想と妖艶が濃密に織りなす、鏡花文学の代表作。",
  geka:"麻酔を拒み、意識のあるまま手術を受けようとする、高貴な夫人。彼女には、執刀する医師との間に、口にできぬ秘めた過去があった。手術台の一瞬に凝縮された悲恋を描く、鏡花初期の名短編。",
  gongitsune:"いたずら好きの子狐ごんは、兵十のうなぎを盗んだ償いのつもりで、こっそり栗や松茸を届け続ける。だが兵十は、その贈り物の主がごんだとは知らないまま……。すれ違う善意の切なさを描く童話の名作。",
  tebukuro:"寒い冬の日、母狐は子狐の片手を人間の手に変え、お金を握らせて、手袋を買いにやらせる。人間を恐れながらも、子狐が町で触れたのは意外なほどの温かさだった。母と子の情愛を描く、優しい童話。",
  akairousoku:"人間の世界に憧れ、我が子を人間に託した人魚。娘が絵を描いた赤い蝋燭は、不思議と海の安全を守る。だが欲深い夫婦が金のために娘を売り飛ばしたとき、海は恐ろしい姿を見せる。哀しく美しい童話。",
  tsukiyo:"静かな月夜、庭で縫い物をする年老いた女のもとを、風変わりな眼鏡売りの老人と、傷ついた小さな娘が訪れる。幻想的な出会いを通して、優しさと憐れみをそっと描いた、小川未明の抒情的な一編。",
  hae:"夏の宿場、乗合馬車を今か今かと待つ人々。それぞれの切実な事情を抱えた乗客たちを乗せて、馬車はやがて出発するが、居眠りする馭者のもと、思わぬ結末へと向かう。一匹の蠅の視点を交えて描く新感覚派の実験作。",
  harubasha:"病に伏す妻を看病して過ごす夫の日々。衰弱していく妻との、いらだちと深い愛情の入り混じった会話。冬の終わり、届けられた春の花とともに近づく別れの予感を、静かに見つめた一編。",
  musashino:"かつて雑木林が一面に広がっていた武蔵野。その自然の美しさを、四季の移ろいや林を歩く記憶とともに、詩情ゆたかにつづった随筆的な小説。日本の風景美の「発見」として名高い、独歩の代表作。",
  kanikosen:"オホーツクの荒海で蟹を獲り、船上で缶詰に加工する蟹工船・博光丸。過酷な労働と、監督のむごい仕打ちに虐げられた労働者たちが、やがて一つに団結して立ち上がる。プロレタリア文学を代表する作品。",
  onshu:"人を殺めて逃げた男が、罪を悔いて僧となり、旅人が命を落とす難所の岸壁に、ただ一人トンネルを掘り抜く難事業へ生涯を捧げる。やがて彼を父の仇と狙う若者が現れるが……。贖罪と和解の物語。",
  kazetachinu:"「風立ちぬ、いざ生きめやも」。高原のサナトリウムで、病の婚約者・節子に寄り添って過ごす「私」。愛する人の死を静かに受けとめながら、生きること、幸福とは何かを見つめる。堀辰雄の代表作。",
  hitofusa:"図画の好きな少年が、級友の美しい絵具をつい盗んでしまう。露見して泣きじゃくる彼を、優しく諭してくれた女の先生。そっと差し出された一房の葡萄が胸に残る、少年の日の悔恨と救いを描く自伝的童話。",
  chikyu:"地球をめぐる奇怪きわまる事件に、科学者たちが知恵をしぼって立ち向かう。日本SFの草分け・海野十三が放つ、スリルとユーモアにあふれた空想科学冒険譚。",
  yoake:"「木曽路はすべて山の中である」。中山道・馬籠宿の本陣に生まれた青山半蔵。幕末から明治維新へ、時代の激動に翻弄されながら理想を追い、やがて破れていく一人の男の生涯を描く、藤村畢生の大河小説。",
  sumida:"隅田川のほとりの下町。俳諧師の叔父のもとで暮らす少年・長吉は、芸者になってゆく幼なじみのお糸にひそかな恋心を抱く。旧き江戸情緒の残る町を背景に、報われぬ淡い恋と若者の憂愁を情緒ゆたかに描く。",
  haguruma:"「僕」を執拗につきまとう、視界の隅にちらつく半透明の歯車の幻覚。ホテルや街をさまよいながら、迫りくる神経の崩壊と死の予感を克明に記す。芥川最晩年の、鬼気迫る自伝的作品。",
  ahou:"芥川が自らの生涯を五十一の断章に凝縮した遺稿。「人生は一行のボオドレエルにも若かない」。芸術と狂気、家族と時代のはざまで生きた一人の作家の内面を、鋭い断片で描く。",
  hokyonin:"長崎の教会に暮らす美しい少年信徒「ろおれんぞ」。ある罪の疑いをかけられて追放されるが、火事の夜、身を挺して示した真実が人々を打つ。切支丹物の名品。",
  gesaku:"老いた戯作者・滝沢馬琴の一日。俗世の雑事や自己嫌悪に苛まれながらも、ついに訪れる創作の恍惚の瞬間。芸術家の苦悩と歓喜を投影した一編。",
  butokai:"明治の鹿鳴館の夜会。フランス人将校と踊る少女・明子。華やかな一夜のときめきと、打ち上げ花火に重ねられた人生の儚さ。後年明かされる相手の正体が、静かな余韻を残す。",
  majutsu:"インド人マティラム・ミスラから魔術を教わる「私」。ただし条件は「欲を捨てること」。大金を目の前にした一瞬の欲が、すべてを夢のように消し去る。教訓のきいた幻想譚。",
  sarukani:"あの昔話「さるかに合戦」の後日談。仇討ちを果たした蟹たちを待っていたのは、世間の冷ややかな評価と裁判だった。寓話を借りて社会の理不尽を風刺する短編。",
  aki:"才媛の姉・信子は、妹が想う男と知りつつ結婚し、平凡な家庭に収まる。歳月を経て再会したとき、胸をよぎる後悔と諦念。女性の心の機微を静かに描く。",
  rokunomiya:"時代の流れに取り残された王朝の姫君。頼る男に去られ、零落していく彼女の、あまりに受け身な生。信仰にも救われぬまま消えていく命を、淡々と描く。",
  tsugaru:"故郷・津軽を旅した太宰が、風土と人情、そして幼い頃の子守り・たけとの再会をつづる紀行文。生地への複雑な思いと、素朴な愛情がにじむ、太宰の代表的な一作。",
  chikuken:"「私は、犬については自信がある。いつか、はうと思っている」。犬を恐れ憎む「私」が、なぜか一匹の犬になつかれてしまう顛末を、自虐とユーモアたっぷりに語る軽妙な一編。",
  goodbye:"多くの女に手を出してきた男が、絶世の美女を「妻」と偽り、女たちに別れを告げて回る計画を立てる。太宰絶筆の未完作。洒脱な喜劇の途中で、筆は絶たれた。",
  tokaton:"敗戦の玉音放送の直後、どこからか聞こえた「トカトントン」という金槌の音。以来、何かに打ち込もうとするたびその音が響き、すべてが虚しくなる——奇妙な手紙形式の一編。",
  romanesque:"仙術太郎・喧嘩次郎兵衛・嘘の三郎——三人の奇人それぞれの物語が語られ、最後に一堂に会する。饒舌でとぼけた語り口の、太宰初期の諧謔にみちた寓話。",
  gyofuku:"山中の滝のほとり、炭焼きの娘・スワ。父との暮らしや淡い思いを抱えた少女が、ある夜、滝に身を投じて鮒に化す。土俗的で幻想的な、太宰初期の短編。",
  tokyo8:"苦難の十年を過ごした東京の、八つの風景に思い出を重ねて振り返る自伝的作品。放蕩と挫折、そして再生へ——過去の自分に決別しようとする作家の回想。",
  higan:"大学を出たての須永が、叔父の紹介で関わる人々と出来事。探偵じみた依頼から、須永と従妹・千代子をめぐる恋の葛藤へ。短編を連ねた後期三部作の第一作。",
  kojin:"学者の兄・一郎は、妻の心がほんとうに自分に向いているか疑い、弟に妻の貞節を試すよう頼む。知性ゆえに孤独と猜疑に苦しむ兄を、弟の目から描く。後期三部作の第二作。",
  garasudo:"病を得た晩年の漱石が、書斎の硝子戸の内から、身辺の出来事や過ぎ去った日々の記憶を静かにつづる随筆集。穏やかな筆致に、人生への深い感慨がにじむ。",
  buncho:"人にすすめられて飼い始めた一羽の文鳥。その愛らしい姿に心を寄せる日々と、ふとした油断がもたらす結末。小さな命を通して哀感を描く、漱石の小品。",
  abe:"主君の死に殉じる「殉死」をめぐり、許されなかった阿部一族の悲劇。武士の意地と面目、藩の論理が絡み合い、一族はついに滅びへと突き進む。武家社会の非情を描く。",
  saigo:"死罪となった父を救おうと、娘・いちが奉行所に嘆願する。「お上のことに間違いはございますまいから」——彼女の放った鋭い一句が、役人たちを慄然とさせる。",
  kanzan:"唐の役人・閭丘胤が、高徳の僧と聞いて訪ねた相手は、寺で下働きをする風変わりな二人、寒山と拾得だった。名利を超えた境地を、飄々と描く掌編。",
  moso:"海辺の家で余生を送る老人が、青年時代の留学から現在まで、生と死をめぐって抱き続けてきた思索を回想する。鴎外自身の死生観を色濃く映した随想的作品。",
  nametoko:"熊を撃って生計を立てる猟師・小十郎。だが彼は熊を憎まず、熊もまた彼を慕う。命を奪い奪われる者の哀しみと敬意を描く、賢治の名作。",
  tsuchigami:"美しい樺の木をめぐり、無骨な土神と、嘘つきだが洗練された狐が張り合う。嫉妬に苦しむ土神が、ある日とった行動とは。切なくも痛切な童話。",
  hyoga:"極寒の地へ向かう列車が、氷河鼠の毛皮を大量に持つ紳士を狙う白熊たちに襲われる。動物を搾取する人間への問いを込めた、賢治の風刺的な童話。",
  cairo:"三十匹の蛙をだまして酒を飲ませ、借金漬けにして家来にした「カイロ団長」のとのさま蛙。だが立場は思わぬ形で逆転する。搾取と改心をユーモラスに描く童話。",
  kainohi:"ひばりの子を助けた兎のホモイは、褒美に美しい宝珠「貝の火」を授かる。だが驕り高ぶるうちに、宝珠はしだいに濁っていく。慢心への戒めを描く童話。",
  otsugomori:"奉公先で健気に働く少女・お峰。大晦日、病の伯父のために工面したわずかな金をめぐって、盗みの疑いという窮地に立たされる。明治の貧しさと人情を描く。",
  wakaremichi:"傘屋で働く小さな少年・吉三と、彼を弟のように可愛がる年上の娘・お京。お京が身を売る道へ進もうとする夜、二人は激しく言い争う。ゆきずれてゆく二人の別れを描く。",
  mojika:"古代アッシリアの都。文字には霊が取り憑くのか——文字を凝視するうち意味が崩れる現象に囚われた老博士が、文字の恐ろしさを説く。知の逆説を描く中島の異色作。",
  gojo:"『西遊記』の沙悟浄が、妖怪となる前、流沙河の底で「自分とは何か」に思い悩み、数多の賢者を訪ね歩く。答えを求めてさまよう知識人の姿を重ねた寓話。",
  gojotan:"旅の途上、沙悟浄が、超然たる悟空、俗物ながら憎めぬ八戒、そして聖なる三蔵法師を見つめ、それぞれの生き方に感嘆し省みる。師弟四人を悟浄の目から描く。",
  fuyunohi:"病を得た青年・堯の、冬の日々。弱った体で街を歩き、落日や風景に感覚を研ぎ澄ませる。生と死のあわいに揺れる心を、繊細な描写で捉えた一編。",
  yaminoemaki:"病後の療養地で「私」が体験する、濃密な闇。街灯もない道の底知れぬ暗黒に、恐怖と陶酔を同時に感じる。闇そのものを主題にした散文詩的作品。",
  aibu:"猫の耳の不思議な手ざわりへの偏愛から、猫を化粧道具にする空想まで——猫をめぐる感覚と幻想を、軽やかに綴った梶井の掌編。",
  utaandon:"芸を捨てさせられた元・能楽師の男が、桑名の宿で、かつて自分が破滅させた按摩の娘と再会する。芸の因縁と情念が絡み合う、鏡花円熟期の名作。",
  kusameikyu:"亡き母が歌った手毬唄を求めてさまよう青年が、迷い込んだ魔性の館。幻想と怪異が幾重にも折り重なる、鏡花の幻想文学の極致。",
  sakuranomori:"満開の桜の下は、なぜか恐ろしい——山賊の男が、美しく残酷な女に魅入られ、その欲望に従ううちに破滅へ向かう。幻想と狂気が咲き乱れる、安吾の代表作。",
  kazehakase:"「風博士」を名乗る奇人が、宿敵「蛸博士」への告発を叫んだ末、風となって消えてしまう——奇想天外な語りで綴られる、安吾のナンセンスな出世作。",
  bunkashikan:"法隆寺も平等院も、なくなって困りはしない——伝統美への通念を退け、「必要」から生まれる本物の美を説く、坂口安吾の痛快な文化論。",
  hananoki:"花のき村にやってきた五人組の盗人。だが村ののどかさと人の善良さに触れるうち、盗人の心にも変化が兆す。人の善性を信じる、新美南吉の温かな童話。",
  nobara:"国境を接する二国。老兵と青年兵、敵味方でありながら、野ばらの咲くそばで親しく語らう二人。だが戦争が、その静かな友情を引き裂く。反戦の思いを込めた小品。",
  cain:"北海道の小作農・広岡仁右衛門。荒々しく反抗的な男は、厳しい自然と地主制度に抗って生きようとするが、ことごとく打ちのめされていく。大地に生きる人間を描く。",
  chisaki:"妻を亡くした父が、幼くして母を失った我が子たちへ書き遺す手紙。「お前たちの一生の旅は遠い」。深い愛と励ましを込めて、亡き妻の思い出とともに語りかける。",
  wasureenu:"宿で出会った文学者が語る「忘れ得ぬ人々」——親しい間柄ではないのに、ふと心に浮かぶ、旅先で見かけただけの見知らぬ人たち。人生の哀愁を静かに描く名品。",
  gyuniku:"集まった男たちの談論。現実的な「牛肉」派か、理想を追う「馬鈴薯」派か。最後に一人が語る「驚きたい」という切なる願いが、人生の本質を突く。",
  harunotori:"城跡の町で、「私」が家庭教師をすることになった、知恵の遅れた少年・六蔵。空を飛ぶ鳥に憧れる純真な少年をめぐる、哀切な物語。",
  kikai:"ネームプレート製造の小さな工場。薬品を扱う職人たちの、疑心と緊張の絡み合い。句読点少ない意識の流れで、人間を機械の歯車のように描く新感覚派の代表作。",
  atama:"「真昼である。特別急行列車は満員のまま全速力で走っていた」——名高い一文で始まる、列車の乗客たちを乾いた視線で切り取った、新感覚派の実験的短編。",
  utsukushii:"高原の避暑地・軽井沢。前年の恋の傷を抱えた「私」が、美しい村を散策しながら、新たな出会いの予感に心を開いていく。抒情ゆたかな堀辰雄の代表作。",
  seikazoku:"敬愛する人の死をきっかけに交わる、青年と、故人ゆかりの母娘。死の影のもとで芽生える淡い愛と、繊細な心理を描く。「死があたかも一つの季節を開いた」。",
  oshie:"病身の女ピアニストが、一人の男に宛てて綴る告白の手紙。押絵をめぐる数奇な因縁と、自らの出生の秘密が、幻想的に語られていく。夢野久作の妖しい一編。",
  shojo:"天真爛漫な看護婦の娘が抱えた、恐ろしい嘘の習癖——三つの少女の悲劇を連ねた連作。無邪気さと狂気が背中合わせの、夢野久作の代表作。",
  meotozenzai:"頼りない道楽者の柳吉と、しっかり者の芸者・蝶子。甲斐性のない男に尽くし、何度も商売を立て直す蝶子。大阪の下町を舞台に、可笑しくも情のある夫婦の姿を描く。",
  futon:"妻子ある中年作家が、若い女弟子に抱く抑えがたい恋情。弟子が去った後、彼女の残した蒲団に顔をうずめて涙する——赤裸々な告白で日本自然主義を確立した問題作。",
  ippeisotsu:"日露戦争の戦地。脚気を病んだ一人の兵士が、隊を離れて野をさまよい、誰にも看取られず息絶えていく。戦争の悲惨を、一兵卒の孤独な死を通して描く。",
  ukigumo:"免職になった生真面目な青年・文三。同居する叔母の家で、従妹・お勢への恋も、世渡り上手な同僚に奪われそうになる。言文一致で書かれた、日本近代小説の嚆矢。",
  gojunoto:"腕はよいが不器用で「のっそり」と呼ばれる大工・十兵衛。恩ある親方を差し置いてでも、五重塔の建立に己のすべてを賭ける。職人の芸術家魂を格調高く描く名作。",
  konjiki:"許婚のお宮を、富豪に奪われた学生・間貫一。「来年の今月今夜……」熱海の海岸での名場面を経て、彼は復讐に燃える高利貸しへと身を落とす。明治の大ベストセラー。",
  younenjidai:"寺に養子として育った少年の、金沢での幼い日々。義母や周囲との関わり、生い立ちの寂しさを、詩人らしい繊細な筆致で回想する自伝的作品。",
  nekomachi:"方向感覚を失ったとき、見慣れた町の裏側に「別の世界」が現れる——散歩の果てに迷い込んだ町で、「私」は突然、無数の猫が満ちる異様な光景を目にする。詩人の幻想散文。",
  cement:"セメント樽の中から出てきた一枚の手紙。それは、恋人を工場の機械で失い、その遺骨がセメントに混じったと訴える女工のものだった。労働者の悲哀を描くプロレタリア文学の名品。",
  byosho:"「病牀六尺、これが我世界である」。脊椎カリエスで寝たきりとなった子規が、死の直前まで書きつづった随筆。病苦のなかでも失われない鋭い観察眼と、生への強い意欲がにじむ。",
  ningyohime:"海の底に住む人魚の末の姫は、嵐で溺れかけた人間の王子に恋をする。美しい声と引きかえに人間の足を得て地上へ上がるが、王子の心は別の娘へと向かう——。自らを犠牲にする純愛と報われぬ切なさを描いた、アンデルセンの代表作。ディズニー『リトル・マーメイド』の原作。",
  akaikutsu:"赤い靴に心を奪われた少女カーレン。見栄と虚栄からその靴を履いて教会へ向かうと、靴はひとりでに踊りだし、脱ぐことも止めることもできなくなる。欲望への戒めを、残酷なまでに鮮烈な幻想で描くアンデルセンの寓話。",
  matchuri:"大晦日の凍える街角で、はだしのままマッチを売る少女。売れずには家に帰れない彼女は、暖をとろうと一本ずつマッチを擦る。その小さな炎の中に、あたたかな幻が次々と浮かんでは消えてゆく。貧しさと祈りを静かに描くアンデルセンの名短編。",
  rapunzel:"魔女にさらわれ、窓のない塔のてっぺんに閉じこめられた、長い髪の娘ラプンツェル。垂らした髪をつたって登ってくる王子との出会いが、二人の運命を大きく動かしてゆく。長い髪・高い塔・魔女——ディズニー『塔の上のラプンツェル』の原作となったグリム童話。",
  shirayukihime:"雪のように白い肌を持つ王女・白雪姫。その美しさに嫉妬する継母の王妃は、鏡に「世界でいちばん美しいのは誰か」と問い続ける。毒りんご、七人の小人、ガラスの棺——誰もが知る名場面を生んだ、グリム童話の代表作。",
  cinderella:"継母と義姉たちにこき使われ、灰まみれで働く娘・灰かぶり。お城の舞踏会の夜、不思議な助けを得て見違えるほど美しく着飾るが、急いで帰る途中に残していったのは、片方の靴だけだった。ディズニー『シンデレラ』の原型となったグリム童話（原題「アッシェンプッテル」）。",
  yukino_joou:"悪魔の鏡のかけらが目と心に刺さり、人が変わってしまった少年カイ。彼を連れ去った雪の女王を追って、幼なじみの少女ゲルダは長い旅に出る。ディズニー『アナと雪の女王』の着想のもととなった、アンデルセンの長編童話。",
  minikui:"アヒルの群れの中で、一羽だけ姿の違う「みにくい」ひな。いじめられ、居場所を失って各地をさまようが、やがて水面に映った自分の本当の姿を知る。アンデルセン自身の人生も重なる、成長と自己肯定の物語。",
  hadaka:"「愚か者には見えない」という不思議な布——それを着物に仕立てさせた見栄っぱりの王さまが、堂々と行列に繰り出す。誰も本当のことを言えないなか、ひとりの子どもが叫んだ一言。権威と虚栄を笑うアンデルセンの寓話。",
  suzuno:"片足だけのすずの兵隊は、紙の踊り子にひそかに恋をする。窓から落ち、どぶを流れ、魚に呑まれても、彼はまっすぐな心を失わない。逆境にも動じない健気さを描く、アンデルセンの名短編。",
  nonohakucho:"継母の呪いで、十一人の兄たちは白鳥に変えられてしまう。妹エリサは、口をきくことを禁じられながら、兄たちを救うためイラクサを黙々と編み続ける。献身と忍耐を描くアンデルセンの童話。",
  soratobu:"空を飛ぶ不思議なトランクを手に入れた商人の息子。それに乗って遠い国の塔へ舞い降り、お姫さまの前でおとぎ話を語って心をつかむが——。機知と、はかない幸運を描くアンデルセンの物語。",
  nightingale:"中国の皇帝を、その歌声で涙させた一羽の夜うぐいす。やがて宝石づくりの機械仕掛けの鳥が現れ、本物は忘れられてしまう。だが皇帝が死の淵に立ったとき——。本物の価値を問うアンデルセンの名作。",
  momino:"早く大きくなりたい、早くここを出たいと願い続けた一本のもみの木。クリスマスに飾られる栄光の夜を迎えるが、「今」を生きられなかった木を待つ結末は切ない。時の流れと足るを知ることを説くアンデルセンの童話。",
  hansel:"貧しさから森に置き去りにされた兄妹ヘンゼルとグレーテル。たどり着いたのはお菓子でできた家——そこに住む恐ろしい魔女の罠だった。知恵で切り抜ける、グリムの代表作。",
  akazukin:"赤ずきんの女の子が、おばあさんのお見舞いに森を行く。だがひと足先に家へ着いた狼が、おばあさんに化けて待ち受けていた。「どうしてそんなに大きなお口なの？」——誰もが知るグリム童話。",
  bremen:"年老いて役立たずと見なされたロバ・犬・猫・にわとり。音楽隊を目指してブレーメンへ向かう道中、彼らは知恵と協力で泥棒たちを追い払う。弱きものたちの痛快な物語、グリム童話。",
  ookami7:"母やぎの留守中、「戸を開けてはいけない」と言いつけられた七ひきの子やぎ。だが狼はあの手この手で母のふりをして忍び込む。呑み込まれた子やぎたちの運命は——。スリルと機転のグリム童話。",
  kaeru_ou:"泉に落とした金の毬を、みにくいカエルが拾ってくれる。代わりの願いを渋々きくお姫さまだが、カエルの正体は思いがけないものだった。約束の意味を説く、グリム童話集の巻頭を飾る一編。",
  hoshino_ginka:"身寄りもなく、着るものさえ持たない貧しい少女。それでも出会う人ごとに、なけなしのパンや服を分け与えていく。すべてを失った彼女に、天から降りそそいだもの——。無償のやさしさを描くグリムの小品。",
  nanawa_karasu:"父の何気ない言葉から、七人の兄たちはカラスに姿を変えられてしまう。生まれた妹は、兄たちを救うため世界の果てまで旅をする。家族への愛を描くグリム童話。",
  muttsu_hakucho:"魔法で白鳥に変えられた六人の兄。妹は六年のあいだ口をきかず、星の花で肌着を縫い続けて兄たちを救おうとする。沈黙と忍耐の献身を描くグリム童話。",
  rumpel:"わらを金に紡げと無理難題を課された娘。小人が手を貸す代わりに求めたのは、生まれてくる我が子だった。娘を救うのは、小人の「名前」を言い当てること——。名前当ての緊張感が光るグリム童話。",
  nagagutsu:"父の遺産としてただ一匹の猫だけを受け継いだ貧しい三男。ところがこの猫、長靴をはき、知恵とはったりで主人を「侯爵」に仕立て上げ、王女との縁まで取り持ってしまう。痛快な出世物語、ペローの名作。",
  nemureru:"祝いの席に招かれなかった魔女の呪いで、姫は糸車の針に刺さり百年の眠りにつく。いばらに閉ざされた城で眠り続ける姫を、目覚めさせるものは——。ディズニー『眠れる森の美女』の原作、ペロー版。",
  aohige:"青いひげの大金持ちに嫁いだ娘。夫は留守中、「この部屋だけは開けてはいけない」と鍵を渡す。好奇心に負けて扉を開けた先で、娘が見たものとは——。禁じられた部屋の戦慄を描くペローの寓話。",
};

function diffMark(d){ let s=""; for(let i=1;i<=5;i++) s+=`<span class="${i<=d?'f':'e'}">●</span>`; return s; }        // 難易度は●
function diffInline(d){ let s=""; for(let i=1;i<=5;i++) s+=`<span style="color:${i<=d?'#6f8fb0':'var(--line)'}">●</span>`; return s; }
function reviewStars(n){ let s=""; for(let i=1;i<=5;i++) s+=`<span class="${i<=n?'on':'off'}">★</span>`; return s; } // レビューは★
function fmtTime(m){ return m<90 ? m+"分" : "約"+Math.round(m/60)+"時間"; }
function lenLabel(m){ return m<20?"短い": m<75?"ふつう": m<200?"長め":"長編"; }

/* ---------- 読書活動ログ（日数・実読書時間・連続日数を蓄積・保存） ---------- */
let readLog = load("shiori.readlog", {days:{}});   // days: { "YYYY-MM-DD": 秒 }
function saveReadLog(){ save("shiori.readlog", readLog); }
let _readLast = Date.now();
function readActive(){ return !document.hidden && !document.getElementById("reader").classList.contains("hidden"); }
function readTick(){
  const now = Date.now();
  if(readActive() && _readLast){
    const dt = (now-_readLast)/1000;
    if(dt>0 && dt<90){ const k=isoNow(); readLog.days[k]=(readLog.days[k]||0)+dt; saveReadLog(); }
  }
  _readLast = now;
}
function readStats(){
  const map = readLog.days||{};
  const set = new Set(Object.keys(map).filter(d=>map[d]>0));
  const totalSec = Object.values(map).reduce((a,b)=>a+(b||0),0);
  const key = dt => dt.toISOString().slice(0,10);
  let streak=0, d=new Date(); if(!set.has(key(d))) d.setDate(d.getDate()-1);
  while(set.has(key(d))){ streak++; d.setDate(d.getDate()-1); }
  return { totalMin: Math.round(totalSec/60), days: set.size, streak };
}
function monthlyStats(n){
  const map=readLog.days||{}, months={};
  for(const d in map){ const mo=d.slice(0,7); months[mo]=(months[mo]||0)+(map[d]||0); }
  const out=[], now=new Date();
  for(let i=n-1;i>=0;i--){ const dt=new Date(now.getFullYear(), now.getMonth()-i, 1);
    const k=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0");
    out.push({ label:(dt.getMonth()+1)+"月", min:Math.round((months[k]||0)/60) });
  }
  return out;
}

(function migrateBookmarks(){
  if(Object.keys(shelf).length) return;
  try{
    const old = JSON.parse(localStorage.getItem("shiori.bookmarks")||"{}");
    let n=0; for(const id in old){ shelf[id] = {fraction:old[id].fraction||0, updated:old[id].updated}; n++; }
    if(n) saveShelf();
  }catch(e){}
})();
const STATUS_LABEL = {unread:"未読", reading:"読書中", done:"読了"};
function statusOf(id){
  const r = shelf[id]; if(!r) return "unread";
  if(r.rating) return "done";
  if((r.fraction||0) >= 0.95) return "done";
  if((r.fraction||0) > 0.005) return "reading";
  return "unread";
}

}

/* ---------- 次の一冊レコメンド（評価・難易度から） ---------- */
function recoCard(w, md, reason, cont){
  return `<div class="reco-card" data-wid="${w.id}">
    <div class="rc-title">${w.title}</div>
    <div class="rc-author">${w.author}</div>
    <div class="rc-reason">${cont?"▶ ":""}${escapeHtml(reason)}</div>
    <div class="rc-meta">難 ${diffInline(md.diff)} ・ <svg class=ic><use href=#ic-clock /></svg> ${fmtTime(md.min)}</div>
  </div>`;
}
function renderRecommendations(show){
  const box=document.getElementById("recos"); if(!box) return;
  if(!show){ box.classList.add("hidden"); box.innerHTML=""; return; }
  const m=id=>META[id]||{min:0,diff:2,beginner:false};
  const done=new Set(WORKS.filter(w=>statusOf(w.id)==="done").map(w=>w.id));
  const readingWorks=WORKS.filter(w=>statusOf(w.id)==="reading");
  const liked=WORKS.filter(w=> shelf[w.id] && shelf[w.id].rating>=4);
  const likedAuthors={}; liked.forEach(w=>{ (likedAuthors[w.author]=likedAuthors[w.author]||[]).push(w); });
  const hasHistory = liked.length>0 || readingWorks.length>0 || done.size>0;
  const targetDiff = liked.length? liked.reduce((s,w)=>s+m(w.id).diff,0)/liked.length : null;

  const scored=WORKS.filter(w=> !done.has(w.id) && statusOf(w.id)!=="reading").map(w=>{
    const md=m(w.id); let sc=0, reason="";
    if(likedAuthors[w.author]){ sc+=3; reason=`『${likedAuthors[w.author][0].title}』がお好みなら、同じ${w.author}を`; }
    if(targetDiff!=null) sc += 2 - Math.min(2, Math.abs(md.diff-targetDiff));
    if(!hasHistory && md.beginner){ sc+=3.5; reason="はじめの一冊に。やさしく短い名作です"; }
    if(!reason){
      if(md.beginner) reason="読みやすく、名作の入り口に";
      else if(md.diff>=4) reason="歯ごたえのある一作。腕試しに";
      else reason="次に読むならこのあたりを";
    }
    sc += (200-Math.min(200,md.min))/400;   // 短めを少し優遇
    return {w, md, sc, reason};
  }).sort((a,b)=> b.sc-a.sc);

  let html=`<h2><svg class=ic><use href=#ic-compass /></svg> ${hasHistory?"あなたへの次の一冊":"はじめの一冊に"}</h2><div class="reco-row">`;
  readingWorks.slice(0,2).forEach(w=>{
    const pct=Math.round((shelf[w.id].fraction||0)*100);
    html+=recoCard(w, m(w.id), `続きから（${pct}%）`, true);
  });
  scored.slice(0,6).forEach(p=> html+=recoCard(p.w, p.md, p.reason, false));
  html+=`</div>`;
  box.innerHTML=html; box.classList.remove("hidden");
  box.querySelectorAll("[data-wid]").forEach(el=> el.onclick=()=>{ const w=WORKS.find(x=>x.id===el.dataset.wid); if(w) openWork(w); });
}

function renderLibrary(){
  const q = (document.getElementById("searchInput").value||"").trim().toLowerCase();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const m = id => META[id] || {min:0,diff:0,beginner:false};
  let list = WORKS.filter(w => !q || (w.title+w.author).toLowerCase().includes(q));
  if(libGenre!=="all") list = list.filter(w => catOf(w)===libGenre);
  if(libBeginnerOnly) list = list.filter(w => m(w.id).beginner);
  if(libCheckedOnly)  list = list.filter(w => shelf[w.id] && shelf[w.id].checked);
  if(libStatus!=="all") list = list.filter(w => statusOf(w.id)===libStatus);

  const grouped = (!q && libSort==="author" && libStatus==="all" && !libBeginnerOnly && !libCheckedOnly);
  if(libSort==="easy")       list = [...list].sort((a,b)=> m(a.id).diff-m(b.id).diff || m(a.id).min-m(b.id).min);
  else if(libSort==="short") list = [...list].sort((a,b)=> m(a.id).min-m(b.id).min);
  else if(libSort==="reco")  list = [...list].sort((a,b)=>
      (m(b.id).beginner-m(a.id).beginner) || (m(a.id).diff-m(b.id).diff) || (m(a.id).min-m(b.id).min));
  else if(libSort==="kana")  list = [...list].sort((a,b)=> a.title.localeCompare(b.title,"ja") || a.author.localeCompare(b.author,"ja"));
  else if(libSort==="rating")list = [...list].sort((a,b)=> ((shelf[b.id]&&shelf[b.id].rating)||0)-((shelf[a.id]&&shelf[a.id].rating)||0));
  else if(libSort==="recent")list = [...list].sort((a,b)=> lastActivity(b.id).localeCompare(lastActivity(a.id)));

  renderRecommendations(!q && libStatus==="all" && libGenre==="all" && !libBeginnerOnly && !libCheckedOnly);

  const parts = [];
  if(libGenre!=="all") parts.push(libGenre==="童話"?"童話・世界の名作":"日本文学");
  if(libBeginnerOnly) parts.push("はじめての一冊");
  if(libCheckedOnly)  parts.push("気になる");
  if(libStatus!=="all") parts.push(STATUS_LABEL[libStatus]);
  document.getElementById("libCount").textContent = q
    ? `${list.length} 作品がヒット`
    : (parts.length ? parts.join(" ・ ")+` ・ ${list.length} 作品` : `全 ${WORKS.length} 作品を収録`);

  if(list.length===0){
    grid.innerHTML = `<div style="grid-column:1/-1;color:var(--sub);padding:34px 4px">該当する作品がありません。</div>`;
    return;
  }

  let lastAuthor = null;
  list.forEach(w=>{
    if(grouped && w.author !== lastAuthor){
      const h = document.createElement("div");
      h.className = "author-head"; h.textContent = w.author;
      grid.appendChild(h); lastAuthor = w.author;
    }
    const md = m(w.id), r = shelf[w.id] || {}, st = statusOf(w.id);
    const pct = Math.round((r.fraction||0)*100);
    const statusText = st==="unread" ? "未読" : st==="reading" ? `読書中 ${pct}%` : "読了";
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML =
      `<span class="spine"></span>` +
      `<button class="checkbtn ${r.checked?'on':''}" title="気になる（あとで読む）に登録" onclick="toggleCheck(event,'${w.id}')"><svg class=ic><use href=#ic-bookmark /></svg><span>${r.checked?'気になる済':'気になる'}</span></button>` +
      `<div class="vtitle">${w.title}</div>` +
      `<div class="author">${w.author}</div>` +
      `<div class="meta">` +
        `<span class="diffm" title="難易度：${DIFF_LABEL[md.diff]||"—"}">難 ${diffMark(md.diff)}</span>` +
        `<span class="rt"><svg class=ic><use href=#ic-clock /></svg> ${fmtTime(md.min)}</span>` +
        (md.beginner ? `<span class="btag">はじめて</span>` : ``) +
      `</div>` +
      `<div class="statusline">` +
        `<span class="stt ${st}">${statusText}</span>` +
        (r.rating ? `<span class="rev-stars" title="あなたの評価">${reviewStars(r.rating)}</span>` : ``) +
      `</div>`;
    c.onclick = ()=> openWork(w);
    grid.appendChild(c);
  });
}

  if(!id) return;
  const w = WORKS.find(x=>x.id===id); if(!w) return;
  const r = rec(id); tmpRating = r.rating||0;
  document.getElementById("finishToast")?.classList.add("hidden");
  const scrim = document.createElement("div");
  scrim.className = "scrim center"; scrim.onclick=(e)=>{ if(e.target===scrim) scrim.remove(); };

    <div class="modal" onclick="event.stopPropagation()">
      <div class="dhead"><h3><svg class=ic><use href=#ic-pen /></svg> レビュー</h3><button class="icon-btn close" onclick="this.closest('.scrim').remove()">閉じる</button></div>
      <div class="dbody">
        <div class="note" style="margin-bottom:14px">${w.title} / ${w.author}</div>
        <div class="field"><label>評価（星）</label><div class="rate" id="rateRow"></div></div>

async function openWork(w){
  cur.work = w;
  _readLast = Date.now();   // 読書時間の計測起点
  document.getElementById("library").classList.add("hidden");
  document.getElementById("reader").classList.remove("hidden");
  document.getElementById("btn-ask").hidden = false;
  document.getElementById("btn-notes").hidden = false;
  document.getElementById("btn-summary").hidden = false;
  document.getElementById("btn-check").hidden = false;
  document.getElementById("btn-review").hidden = false;
  document.getElementById("btn-ruby").hidden = false;
  document.getElementById("btn-stats").hidden = true;
  document.getElementById("btn-collection").hidden = true;
  document.getElementById("btn-check").classList.toggle("active", !!(shelf[w.id] && shelf[w.id].checked));
  document.getElementById("finishToast").classList.add("hidden");
  reviewPrompted = false;
  document.getElementById("readTitle").textContent = `${w.title} — ${w.author}`;
  const loading = document.getElementById("readerLoading");
  const book = document.getElementById("book");
  book.innerHTML = ""; loading.classList.remove("hidden"); setLoadingMsg("本を開いています…");

  try{
    const url = RAW + w.file;
    const res = await fetch(url);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const buf = await res.arrayBuffer();
    const html = new TextDecoder("shift_jis").decode(buf);
    const doc = new DOMParser().parseFromString(html, "text/html");

    // resolve relative image (gaiji) URLs to absolute
    doc.querySelectorAll("img").forEach(img=>{
      const src = img.getAttribute("src");
      if(src) img.setAttribute("src", new URL(src, url).href);
    });

    const main = doc.querySelector(".main_text");
    const titleEl = doc.querySelector(".title");
    const authorEl = doc.querySelector(".author");
    const frag = document.createElement("div");
    if(titleEl){ const h=document.createElement("h1"); h.className="title"; h.textContent=titleEl.textContent; frag.appendChild(h); }
    if(authorEl){ const h=document.createElement("h2"); h.className="author"; h.textContent=authorEl.textContent; frag.appendChild(h); }
    if(main){ frag.appendChild(main); }
    else { frag.appendChild(doc.body); }

    book.innerHTML = frag.innerHTML;
    cur.plainText = (main? main.textContent : frag.textContent).replace(/\s+/g," ").trim();
    cur.baseHTML = book.innerHTML;   // ふりがな適用前のHTML（OFFで復元）
    cur.rubyOn = false;
    document.getElementById("btn-ruby").classList.remove("active");

    await (document.fonts ? document.fonts.ready : Promise.resolve());
    loading.classList.add("hidden");
    requestAnimationFrame(()=>{
      renderHighlights();   // マーカーは背景色のみなのでレイアウトを変えない
      paginate();
      const r = shelf[w.id];
      goToFraction(r ? (r.fraction||0) : 0, false);
    });
  }catch(err){
    loading.classList.add("hidden");
    book.innerHTML = `<div style="writing-mode:horizontal-tb;color:var(--sub);line-height:2;max-width:60ch">`+
      `本文を取得できませんでした。<br>ネットワーク接続、または通信のブロック（拡張機能等）をご確認ください。<br><br>`+
      `<span style="font-size:12px">${(err&&err.message)||err}</span></div>`;
  }
}

/* =========================================================
   VERTICAL PAGINATION
   ========================================================= */
function paginate(){
  const stage = document.getElementById("stage");
  const book = document.getElementById("book");
  const csBook = getComputedStyle(book);
  const rightGap = parseFloat(csBook.right)||0;
  const leftGap  = 8;
  const avail = stage.clientWidth - rightGap - leftGap;
  let pitch = parseFloat(csBook.lineHeight);
  if(!pitch || isNaN(pitch)) pitch = parseFloat(csBook.fontSize)*2;
  const colsPerPage = Math.max(1, Math.floor(avail / pitch));
  cur.colPitch = pitch;
  cur.pageWidth = colsPerPage * pitch;
  const total = book.scrollWidth;
  cur.pages = Math.max(1, Math.ceil(total / cur.pageWidth));
  applyPage();
}
function applyPage(animate=true){
  const book = document.getElementById("book");
  if(!animate) book.style.transition = "none";
  book.style.transform = `translateX(${cur.page * cur.pageWidth}px)`;
  if(!animate) requestAnimationFrame(()=> book.style.transition = "");
  const frac = cur.pages>1 ? cur.page/(cur.pages-1) : 0;
  document.getElementById("progBar").style.width = (frac*100)+"%";
  const knob=document.getElementById("progKnob"); if(knob) knob.style.left = ((1-frac)*100)+"%";   // 右=最初, 左へ進む（縦書き右→左に合わせる）
  document.getElementById("pageNo").textContent = `${cur.page+1}/${cur.pages}・${Math.round(frac*100)}%`;
  if(cur.work){
    const r = rec(cur.work.id);
    r.fraction = frac; r.updated = isoNow();
    saveShelf();
    // 最終ページに到達したら（まだレビュー未記入なら）そっと促す
    if(cur.pages>1 && cur.page===cur.pages-1 && !r.rating) maybePromptReview();
  }
}

/* 読み終えた作品をもとに「こちらもおすすめ」を選ぶ（同じ作者・近い難易度・好み・短さを加点） */
function recommendFor(finishedId, n){
  const m=id=>META[id]||{min:0,diff:2,beginner:false};
  const done=new Set(WORKS.filter(w=>statusOf(w.id)==="done").map(w=>w.id));
  const fin=finishedId? WORKS.find(w=>w.id===finishedId):null;
  const finMd=fin? m(fin.id):null;
  const liked=WORKS.filter(w=> shelf[w.id] && shelf[w.id].rating>=4);
  const likedAuthors={}; liked.forEach(w=>{ (likedAuthors[w.author]=likedAuthors[w.author]||[]).push(w); });
  const scored=WORKS.filter(w=> w.id!==finishedId && !done.has(w.id) && statusOf(w.id)!=="reading").map(w=>{
    const md=m(w.id); let sc=0, reason="";
    if(fin && w.author===fin.author){ sc+=4; reason=`同じ${w.author}の作品`; }
    else if(likedAuthors[w.author]){ sc+=3; reason=`『${likedAuthors[w.author][0].title}』がお好みなら`; }
    if(finMd) sc += 2 - Math.min(2, Math.abs(md.diff-finMd.diff));
    if(!reason){
      if(md.beginner) reason="読みやすい名作";
      else if(md.diff>=4) reason="歯ごたえのある一作";
      else reason="次に読むならこのあたり";
    }
    sc += (200-Math.min(200,md.min))/400;   // 短めを少し優遇
    return {w, md, sc, reason};
  }).sort((a,b)=> b.sc-a.sc);
  return scored.slice(0, n);
}
let pinchActive=false, pinchUntil=0;   // ピンチズーム中/直後はページ送りを無効化
function turn(dir, count=1){
  if(pinchActive || Date.now()<pinchUntil) return;   // ズーム操作の巻き込み防止
  const next = Math.min(Math.max(cur.page + dir*count, 0), cur.pages-1);
  if(next===cur.page) return;
  hideHlTip(); hideSelTip();
  cur.page = next; applyPage();
}
function goToFraction(frac, animate=true){
  cur.page = Math.round(frac * Math.max(0,(cur.pages-1)));
  cur.page = Math.min(Math.max(cur.page,0), cur.pages-1);
  applyPage(animate);
}
function seekProgress(ev){
  const box = ev.currentTarget.getBoundingClientRect();
  const frac = (ev.clientX - box.left)/box.width;
  goToFraction(frac);
}
function isoNow(){ return new Date().toISOString().slice(0,10); }

// ホイール/トラックパッド: スクロール量をためて一気に複数ページ送り（読み飛ばし用）
let wheelAccum=0, wheelTimer=null;
document.getElementById("stage").addEventListener("wheel", e=>{
  e.preventDefault();
  wheelAccum += (e.deltaY||e.deltaX);
  const step = 40;                                  // これだけ溜まるごとに1ページ
  const n = Math.trunc(wheelAccum/step);
  if(n!==0){ wheelAccum -= n*step; turn(n>0?-1:1, Math.abs(n)); }   // 前(上)スクロール=進む / 後(下)=戻る
  clearTimeout(wheelTimer); wheelTimer=setTimeout(()=>wheelAccum=0,180);
},{passive:false});
// スワイプでのページ送りは廃止（送りはボタンのみ）。ピンチズーム中の誤爆だけ検知して抑止する。
const _stageEl=document.getElementById("stage");
_stageEl.addEventListener("touchstart",e=>{ if(e.touches.length>1) pinchActive=true; },{passive:true});
_stageEl.addEventListener("touchend",e=>{ if(e.touches.length===0){ if(pinchActive) pinchUntil=Date.now()+400; pinchActive=false; } },{passive:true});
// 進捗バー: タップ＆ドラッグで一気に読み位置を移動（スクラブ）
(function(){
  const pb=document.getElementById("progress"); if(!pb) return;
  let dragging=false;
  const seekAt=x=>{ const box=pb.getBoundingClientRect(); goToFraction((box.right-x)/box.width, false); };   // 右端=最初, 左へドラッグで前進
  pb.addEventListener("pointerdown",e=>{ dragging=true; try{pb.setPointerCapture(e.pointerId);}catch(_){}; seekAt(e.clientX); });
  pb.addEventListener("pointermove",e=>{ if(dragging) seekAt(e.clientX); });
  pb.addEventListener("pointerup",()=>{ dragging=false; });
  pb.addEventListener("pointercancel",()=>{ dragging=false; });
})();

let customSel=null;   // タッチの長押し一文選択 {text, fStart, fEnd, occurrence}（PCでは常にnull）
document.addEventListener("selectionchange", ()=>{
  if(customSel) return;                 // カスタム選択中はネイティブ選択に触らない
  const tip = document.getElementById("seltip");
  const sel = document.getSelection();
  const book = document.getElementById("book");
  if(!sel || sel.isCollapsed || document.getElementById("reader").classList.contains("hidden")){ tip.classList.add("hidden"); return; }
  const text = sel.toString().trim();
  if(!text || text.length>300 || !book.contains(sel.anchorNode)){ tip.classList.add("hidden"); return; }
  const r = sel.getRangeAt(0).getBoundingClientRect();
  tip.style.left = (r.left + r.width/2)+"px";
  tip.style.top = r.top+"px";
  tip.classList.remove("hidden");
});
function currentSelectionText(){ if(customSel) return customSel.text; const s=document.getSelection(); return s? s.toString().trim():""; }

/* ---------- タッチ: 長押しで「一文」を選択（iOS標準メニューを使わない独自方式） ---------- */
function clearCustomSel(){
  customSel=null;
  document.querySelectorAll("#book mark.selpreview").forEach(m=>{ const p=m.parentNode; if(!p) return; while(m.firstChild) p.insertBefore(m.firstChild,m); p.removeChild(m); p.normalize(); });
}
function caretFlatAt(x,y){
  let node=null, offset=0;
  if(document.caretRangeFromPoint){ const r=document.caretRangeFromPoint(x,y); if(r){ node=r.startContainer; offset=r.startOffset; } }
  else if(document.caretPositionFromPoint){ const p=document.caretPositionFromPoint(x,y); if(p){ node=p.offsetNode; offset=p.offset; } }
  if(!node) return null;
  const book=document.getElementById("book"); if(!book.contains(node)) return null;
  if(node.nodeType!==3) return null;
  const flat=buildFlat(book);
  for(const s of flat.segs){ if(s.node===node) return {flat, idx:s.start+Math.min(offset,s.len)}; }
  return null;
}
function wrapSelPreview(flat, fStart, fEnd){
  for(const s of flat.segs){
    const segEnd=s.start+s.len;
    if(segEnd<=fStart || s.start>=fEnd) continue;
    const a=Math.max(fStart,s.start)-s.start, b=Math.min(fEnd,segEnd)-s.start;
    if(b<=a) continue;
    try{ const range=document.createRange(); range.setStart(s.node,a); range.setEnd(s.node,b);
      const mark=document.createElement("mark"); mark.className="selpreview"; range.surroundContents(mark);
    }catch(e){}
  }
}
function scriptClass(ch){
  if(/[一-鿿々〆ヶ]/.test(ch)) return "kanji";
  if(/[ぁ-ゖ]/.test(ch)) return "hira";
  if(/[ァ-ヺー]/.test(ch)) return "kata";
  if(/[0-9A-Za-zＡ-Ｚａ-ｚ０-９]/.test(ch)) return "latin";
  return "other";
}
// キャレット位置の「語」＝同じ字種の連なり（長すぎる連なりは控えめに切る）
function wordRangeAt(text, idx){
  if(idx>=text.length) idx=Math.max(0,text.length-1);
  if(idx<0) return [0,0];
  const cls=scriptClass(text[idx]);
  if(cls==="other") return [idx, Math.min(idx+1,text.length)];
  let s=idx, e=idx+1;
  while(s>0 && scriptClass(text[s-1])===cls) s--;
  while(e<text.length && scriptClass(text[e])===cls) e++;
  if(e-s>16){ s=Math.max(s, idx-6); e=Math.min(e, idx+10); }
  return [s,e];
}
// カスタム選択を [s,e) に設定＆見た目更新（DOMはclear済み・flatはclean前提）
function setCustomSelRange(flat, s, e){
  s=Math.max(0,s); e=Math.min(flat.text.length, Math.max(s+1,e));
  const text=flat.text.slice(s,e);
  let occ=0, from=0, idx; while((idx=flat.text.indexOf(text,from))>=0 && idx<s){ occ++; from=idx+1; }
  customSel={text, fStart:s, fEnd:e, occurrence:occ};
  wrapSelPreview(flat, s, e);
}
function showSelMenu(){
  const marks=document.querySelectorAll("#book mark.selpreview");
  const tip=document.getElementById("seltip");
  if(marks.length){
    let L=Infinity,R=-Infinity,T=Infinity;
    marks.forEach(m=>{ const r=m.getBoundingClientRect(); L=Math.min(L,r.left); R=Math.max(R,r.right); T=Math.min(T,r.top); });
    tip.style.left=((L+R)/2)+"px"; tip.style.top=T+"px";
  }
  tip.classList.remove("hidden");
}
(function(){   // タッチ: 長押しで語を選択→そのままドラッグで範囲調整（iOS標準選択は使わない）
  const stage=document.getElementById("stage"); if(!stage) return;
  let timer=null, sx=0, sy=0, selecting=false, anchor=-1, rafPending=false, lastXY=null;
  const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
  const isUI=t=> t && t.closest && t.closest(".page-turn, .readbar, #seltip, #hltip, mark.hl");
  const beginSelect=(x,y)=>{
    clearCustomSel();
    const hit=caretFlatAt(x,y); if(!hit) return false;
    const wr=wordRangeAt(hit.flat.text, hit.idx);
    anchor=wr[0];                                   // ドラッグは語の先頭を起点に伸縮
    setCustomSelRange(hit.flat, wr[0], wr[1]);
    selecting=true;
    if(navigator.vibrate){ try{navigator.vibrate(8);}catch(_){} }
    return true;
  };
  const extendSelect=(x,y)=>{
    clearCustomSel();
    const hit=caretFlatAt(x,y); if(!hit || anchor<0) return;
    setCustomSelRange(hit.flat, Math.min(anchor,hit.idx), Math.max(anchor,hit.idx)+1);
  };
  stage.addEventListener("touchstart",e=>{
    cancel(); selecting=false;
    if(e.touches.length!==1 || isUI(e.target)) return;
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY;
    timer=setTimeout(()=>{ timer=null; beginSelect(sx,sy); }, 420);
  },{passive:true});
  stage.addEventListener("touchmove",e=>{
    if(selecting){
      if(e.cancelable) e.preventDefault();                 // 選択中はスクロール/ズームを止める
      const t=e.touches[0]; if(!t) return;
      lastXY=[t.clientX,t.clientY];
      if(!rafPending){ rafPending=true; requestAnimationFrame(()=>{ rafPending=false; if(lastXY) extendSelect(lastXY[0],lastXY[1]); }); }
      return;
    }
    const t=e.touches[0]; if(!t) return;
    if(Math.abs(t.clientX-sx)>10 || Math.abs(t.clientY-sy)>10) cancel();   // 長押し確定前に動いたら中止
  },{passive:false});
  stage.addEventListener("touchend",e=>{
    cancel();
    if(selecting){ selecting=false; if(customSel) showSelMenu(); return; }
    if(isUI(e.target)) return;
    if(customSel){ clearCustomSel(); hideSelTip(); }        // 何もない所をタップ→選択解除
  },{passive:true});
})();

};
const EMO_WORDS = {
  joy:["笑","嬉","喜","楽し","幸","微笑","歓","朗","晴れやか"],
  sorrow:["涙","泣","悲","寂","哀","淋","孤","嘆","別れ","切な"],
  anger:["怒","憤","睨","叫","罵","憎","苛","激し","怒鳴"],
  fear:["恐","怖","慄","闇","血","震","悲鳴","死骸","戦慄","不気味","呪"],
  calm:["静","穏","眠","夜","月","風","雪","水","空","佇","漂"],
};
function visiblePageText(){
  const t = cur.plainText || "";
  if(!t) return "";
  const per = Math.max(400, Math.ceil(t.length / Math.max(1,cur.pages)));
  const start = Math.floor((cur.page/Math.max(1,cur.pages)) * t.length);
  return t.slice(start, start+Math.floor(per*1.4));
}
function analyzeEmotion(text){
  let best="calm", bestN=0;
  for(const k in EMO_WORDS){
    let n=0; EMO_WORDS[k].forEach(w=>{ let i=0; while((i=text.indexOf(w,i))>=0){n++;i+=w.length;} });
    if(n>bestN){ bestN=n; best=k; }
  }
  return {key:best, score:bestN};
}

function katToHira(s){ return s.replace(/[ァ-ヶ]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60)); }
function hasKanji(s){ return /[一-鿿㐀-䶿々]/.test(s); }
const sleep0 = ()=> new Promise(r=>setTimeout(r,0));

function isKanjiChar(c){ return /[一-鿿㐀-䶿]/.test(c); }
function hasDifficultKanji(s){ for(const c of s){ if(isKanjiChar(c) && !EASY_KANJI.has(c)) return true; } return false; }

/* --- 形態素解析は Web Worker（別スレッド）で回す：iPhoneでも本体UIが固まらない --- */
let rubyWorker=null, rubyWorkerReady=null, rubyReqSeq=0, rubyPending={};
function getRubyWorker(){
  if(rubyWorkerReady) return rubyWorkerReady;
  rubyWorkerReady = new Promise((resolve, reject)=>{
    try{
      const code =
        'var TOK=null;'+
        'importScripts(' + JSON.stringify(KUROMOJI_BASE+"build/kuromoji.js") + ');'+
        'kuromoji.builder({dicPath:' + JSON.stringify(KUROMOJI_BASE+"dict/") + '}).build(function(err,tok){'+
        '  if(err){ postMessage({type:"ready",ok:false,err:String(err)}); return; }'+
        '  TOK=tok; postMessage({type:"ready",ok:true});'+
        '});'+
        'onmessage=function(e){'+
        '  var d=e.data;'+
        '  var out=d.texts.map(function(t){'+
        '    try{ return TOK.tokenize(t).map(function(x){ return [x.surface_form,(x.reading&&x.reading!=="*")?x.reading:""]; }); }'+
        '    catch(_){ return null; }'+
        '  });'+
        '  postMessage({type:"tok",id:d.id,out:out});'+
        '};';
      const w = new Worker(URL.createObjectURL(new Blob([code],{type:"application/javascript"})));
      w.onmessage = (e)=>{
        const d=e.data;
        if(d.type==="ready"){ if(d.ok){ rubyWorker=w; resolve(w); } else reject(new Error(d.err||"build failed")); }
        else if(d.type==="tok"){ const p=rubyPending[d.id]; if(p){ delete rubyPending[d.id]; p(d.out); } }
      };
      w.onerror = ()=> reject(new Error("worker error"));
    }catch(e){ reject(e); }
  });
  return rubyWorkerReady;
}
function workerTokenize(texts){
  return new Promise((resolve)=>{ const id=++rubyReqSeq; rubyPending[id]=resolve; rubyWorker.postMessage({id, texts}); });
}
/* Worker不可時のフォールバック（メインスレッド） */
let kuromojiTok=null, kuromojiLoading=null;
function loadKuromoji(){
  if(kuromojiTok) return Promise.resolve(kuromojiTok);
  if(kuromojiLoading) return kuromojiLoading;
  kuromojiLoading = new Promise((resolve,reject)=>{
    const s=document.createElement("script"); s.src=KUROMOJI_BASE+"build/kuromoji.js";
    s.onload=()=>{ window.kuromoji.builder({dicPath:KUROMOJI_BASE+"dict/"}).build((err,tok)=>{ if(err){reject(err);return;} kuromojiTok=tok; resolve(tok); }); };
    s.onerror=()=>reject(new Error("kuromoji script load failed"));
    document.head.appendChild(s);
  });
  return kuromojiLoading;
}

function collectRubyNodes(root){
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      if(!n.nodeValue || !n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      let p=n.parentNode;
      while(p && p!==root){ const t=p.nodeName; if(t==="RUBY"||t==="RT"||t==="RP") return NodeFilter.FILTER_REJECT; p=p.parentNode; }
      return hasDifficultKanji(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const nodes=[]; let n; while(n=walker.nextNode()) nodes.push(n); return nodes;
}
function rubyFragmentFromTokens(tokens){
  const frag=document.createDocumentFragment();
  for(const pair of tokens){
    const surface=pair[0], reading = pair[1]?katToHira(pair[1]):"";
    if(hasDifficultKanji(surface) && reading && reading!==surface){
      const ruby=document.createElement("ruby");
      ruby.appendChild(document.createTextNode(surface));
      const rt=document.createElement("rt"); rt.textContent=reading; ruby.appendChild(rt);
      frag.appendChild(ruby);
    } else frag.appendChild(document.createTextNode(surface));
  }
  return frag;
}
async function applyTotalRuby(root){
  const nodes = collectRubyNodes(root);
  const total = nodes.length || 1;
  setLoadingMsg("ふりがな辞書を準備しています…（初回のみ数十秒）");
  let useWorker = true, tokMain = null;
  try{ await getRubyWorker(); }
  catch(e){ useWorker = false; tokMain = await loadKuromoji(); }   // Worker不可→メインスレッド

  const BATCH = 24;
  for(let i=0; i<nodes.length; i+=BATCH){
    const batch = nodes.slice(i, i+BATCH);
    let results;
    if(useWorker){ results = await workerTokenize(batch.map(n=>n.nodeValue)); }
    else { results = batch.map(n=>{ try{ return tokMain.tokenize(n.nodeValue).map(x=>[x.surface_form,(x.reading&&x.reading!=="*")?x.reading:""]); }catch(_){ return null; } }); }
    for(let j=0;j<batch.length;j++){
      const tokens = results[j]; if(!tokens) continue;
      batch[j].parentNode.replaceChild(rubyFragmentFromTokens(tokens), batch[j]);
    }
    setLoadingMsg("ふりがなを付けています… " + Math.min(100, Math.round((i+BATCH)/total*100)) + "%");
    await sleep0();   // バッチ毎にUIへ制御を返す（固まらない）
  }
}

let rubyBusy = false;
async function toggleRuby(){
  if(!cur.work || rubyBusy) return;
  const book = document.getElementById("book");
  const loading = document.getElementById("readerLoading");
  const btn = document.getElementById("btn-ruby");
  const frac = cur.pages>1 ? cur.page/(cur.pages-1) : 0;   // 読書位置を保つ
  if(cur.rubyOn){
    // OFF: ふりがな適用前に戻す
    book.innerHTML = cur.baseHTML;
    cur.rubyOn = false; btn.classList.remove("active");
    requestAnimationFrame(()=>{ renderHighlights(); paginate(); goToFraction(frac,false); });
    return;
  }
  // ON: 必要になったので付与
  rubyBusy = true;
  loading.classList.remove("hidden");
  setLoadingMsg("すべての漢字にふりがなを付けています…（初回のみ辞書読み込みで数十秒）");
  try{
    await applyTotalRuby(book);
    cur.rubyOn = true; btn.classList.add("active");
  }catch(e){
    setLoadingMsg("ふりがな辞書の読み込みに失敗しました。通信状況をご確認ください。");
    await sleep0();
  }
  loading.classList.add("hidden");
  rubyBusy = false;
  requestAnimationFrame(()=>{ renderHighlights(); paginate(); goToFraction(frac,false); });
}

function geminiKey(){ return (settings.geminiKey||"").trim(); }
function hasKey(){ return !!geminiKey(); }

/* ---------- Gemini API（無料枠・クレカ不要・ブラウザ直叩き・429で自動モデル切替） ----------
   引数は OpenAI 互換の messages 形式（[{role:"system"|"user",content}]）。戻り値はプレーンテキスト。 */
const GEMINI_MODELS=["gemini-2.5-flash-lite","gemini-2.0-flash","gemini-2.5-flash"];
async function openaiChat(messages, opts={}){
  const key=geminiKey();
  if(!key) throw new Error("Gemini APIキーが未設定です。<svg class=ic><use href=#ic-settings /></svg>設定で無料キーを入れてください。");
  const sys = messages.filter(m=>m.role==="system").map(m=>m.content).join("\n\n");
  const userText = messages.filter(m=>m.role!=="system").map(m=>m.content).join("\n\n");
  const preferred = settings.chatModel || GEMINI_MODELS[0];
  const pool = [preferred, ...GEMINI_MODELS.filter(m=>m!==preferred)];   // 今のモデル→他モデルの順に試す
  for(let mi=0; mi<pool.length; mi++){
    const model = pool[mi];
    const gc = { temperature: opts.temperature!=null?opts.temperature:0.7, maxOutputTokens: opts.maxOutputTokens||1024 };
    if(/2\.5/.test(model)) gc.thinkingConfig={thinkingBudget:0};   // 思考OFF指定は2.5系のみ対応
    const body = { contents:[{role:"user",parts:[{text:userText}]}], generationConfig:gc };
    if(sys) body.systemInstruction={parts:[{text:sys}]};
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
    let res;
    for(let attempt=0; attempt<3; attempt++){
      res=await fetch(url,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
      if(res.status!==503 && res.status!==500) break;   // 高負荷(混雑)は少し待って自動リトライ
      if(attempt<2) await new Promise(r=>setTimeout(r,1500*(attempt+1)));
    }
    if(res.status===429 && mi<pool.length-1) continue;   // 上限→自動で次のモデルへ
    if(!res.ok){
      let msg=res.status+" "+res.statusText;
      try{ const e=await res.json(); msg=(e.error&&e.error.message)||msg; }catch(_){}
      if(res.status===400 && /API key|API_KEY/i.test(msg)) msg="APIキーが無効です。設定を確認してください。";
      if(res.status===403) msg="APIキーが無効か権限がありません。設定を確認してください。";
      if(res.status===429) msg="無料枠の上限に達しました。しばらく待つか、明日また試してください（無料枠は日本の昼ごろリセット）。";
      if(res.status===503||res.status===500) msg="Geminiが一時的に混雑しています（高負荷）。数十秒おいて再試行してください。";
      throw new Error(msg);
    }
    const data=await res.json();
    if(data.promptFeedback&&data.promptFeedback.blockReason) throw new Error("安全上の理由でブロックされました。質問を変えてお試しください。");
    const cand=data.candidates&&data.candidates[0];
    const text=((cand&&cand.content&&cand.content.parts)||[]).map(p=>p.text).filter(Boolean).join("").trim();
    if(!text) throw new Error("応答を取得できませんでした。"+(cand&&cand.finishReason?` (${cand.finishReason})`:""));
    if(model!==settings.chatModel){ settings.chatModel=model; saveSettings(); }   // 通ったモデルを次回優先
    return text;
  }
}

function setOut(id, html, cls){ const el=document.getElementById(id); if(!el) return; el.className="ai-out"+(cls?" "+cls:""); el.innerHTML=html; }
function loadingOut(id,label){ setOut(id, `<span class="spin"></span> ${label||"生成中…"}`); }
function trimLen(s,n){ s=(s||"").trim(); return s.length>n ? s.slice(0,n)+"…" : s; }

/* ---- 無料の辞書・百科事典（APIキー不要, CORS対応） ---- */
async function dictLookup(term){
  // 1) Wiktionary（語義）
  try{
    const u = `https://ja.wiktionary.org/w/api.php?action=query&prop=extracts&explaintext=1&redirects=1&titles=${encodeURIComponent(term)}&format=json&origin=*`;
    const d = await (await fetch(u)).json();
    const p = Object.values(d.query.pages)[0];
    if(p && !("missing" in p) && p.extract && p.extract.trim()){
      return {source:"Wiktionary", title:p.title, text:cleanWiktionary(p.extract)};
    }
  }catch(e){}
  // 2) Wikipedia（百科事典）フォールバック
  try{
    const r = await fetch(`https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`);
    if(r.ok){ const s = await r.json(); if(s.extract) return {source:"Wikipedia", title:s.title, text:s.extract, url:s.content_urls&&s.content_urls.desktop&&s.content_urls.desktop.page}; }
  }catch(e){}
  return null;
}
function cleanWiktionary(t){
  let s = t.trim();
  const idx = s.indexOf("\n== ", 3);                         // 次の言語見出しの前で切る
  if(idx>0) s = s.slice(0, idx);
  s = s.replace(/===\s*発音[\s\S]*?(?=\n===|\n==|$)/g,"");    // 発音ブロックを除去
  s = s.replace(/===\s*(翻訳|関連語|類義語|対義語|語源|熟語)[\s\S]*?(?=\n===|\n==|$)/g,"");
  return s.replace(/\n{3,}/g,"\n\n").trim();
}
async function wikiTitleSummary(title){
  const r = await fetch(`https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
  if(!r.ok) return null; const s = await r.json();
  return {title:s.title, extract:s.extract, url:s.content_urls&&s.content_urls.desktop&&s.content_urls.desktop.page};
}

async function runDict(){
  const el = document.getElementById("dictInput");
  const term = (el?el.value:"").trim();
  if(!term){ setOut("dictOut","言葉を入力してください。","placeholder"); return; }
  loadingOut("dictOut","「"+term+"」を辞書で検索中…");
  try{
    const r = await dictLookup(term);
    if(!r){ setOut("dictOut","「"+term+"」の項目が見つかりませんでした。送り仮名を外すなど、表記を変えてお試しください。","placeholder"); return; }
    const src = r.url? `\n\n▶ 出典: ${r.source}「${r.title}」`:`\n\n（出典: ${r.source}）`;
    setOut("dictOut", `■ ${r.title}\n\n`+trimLen(r.text,900)+src);
  }catch(e){ setOut("dictOut","エラー: "+e.message,"placeholder"); }
}
